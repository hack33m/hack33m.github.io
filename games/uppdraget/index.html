<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Uppdraget</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0f;
      overflow: hidden;
      font-family: 'Nunito', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    canvas { display: block; width: 100vw; height: 100vh; outline: none; }
  </style>
</head>
<body>
<canvas id="game" tabindex="0"></canvas>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  canvas.focus();
  window.addEventListener('load', () => canvas.focus());

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);
  const W = () => window.innerWidth;
  const H = () => window.innerHeight;

  // === COLORS ===
  const COL = {
    bg: '#0a0a0f',
    grass: '#2a3a20', grassLight: '#3a4a2a',
    dirt: '#3a3020', dirtLight: '#4a4030',
    water: '#1a3050', waterLight: '#2a4a6a',
    snow: '#4a5060', snowLight: '#6a7080',
    wood: '#5a4030', woodDark: '#3a2a1a',
    stone: '#5a5a5a', stoneDark: '#3a3a3a',
    roof: '#8a3030', roofDark: '#6a2020',
    tree: '#1a3a1a', treeDark: '#0a2a0a', trunk: '#4a3020',
    night: '#080810', nightSky: '#0a0f20',
    gold: '#b48c50', goldLight: '#d4a55a',
    text: '#e8dcc8', textDim: '#8a7e6a',
    danger: '#aa3030',
    maja: '#d4a574', majaHair: '#8a5a30', majaDress: '#5a7aaa',
    ben: '#c49a6a', benHair: '#2a1a0a', benShirt: '#5a7050',
    hilde: '#e8c8a8', hildeHair: '#d4b470', hildeDress: '#7a5a6a',
    soldier: '#4a5a3a', soldierHelm: '#3a4a2a',
    lantern: '#ffaa40',
  };

  // === STATE ===
  const STATE = { TITLE: 0, STORY: 1, PLAY: 2, DIALOGUE: 3, END: 4, CHAPTER: 5 };
  let state = STATE.TITLE;
  let score = 0;
  let chapter = 0;
  let sceneIndex = 0;
  let fadeAlpha = 0;
  let fadeDir = 0; // 1 = fading out, -1 = fading in
  let fadeCallback = null;
  let titleReady = false;
  setTimeout(() => titleReady = true, 500);

  // === INPUT ===
  const keys = {};
  document.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
  document.addEventListener('keyup', e => { keys[e.code] = false; });

  let touchX = 0, touchY = 0, touching = false, tapped = false;
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    touchX = t.clientX; touchY = t.clientY;
    touching = true; tapped = true;
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    touchX = t.clientX; touchY = t.clientY;
  }, { passive: false });
  canvas.addEventListener('touchend', e => { e.preventDefault(); touching = false; }, { passive: false });
  canvas.addEventListener('mousedown', e => { tapped = true; touchX = e.clientX; touchY = e.clientY; });

  // === HELPERS ===
  function drawText(text, x, y, size, color, align, maxW, bold) {
    ctx.font = `${bold ? '700' : '400'} ${size}px 'Nunito', sans-serif`;
    ctx.fillStyle = color;
    ctx.textAlign = align || 'center';
    ctx.textBaseline = 'middle';
    if (maxW) ctx.fillText(text, x, y, maxW);
    else ctx.fillText(text, x, y);
  }

  function wrapText(text, x, y, maxW, lineH, size, color, bold) {
    ctx.font = `${bold ? '700' : '400'} ${size}px 'Nunito', sans-serif`;
    ctx.fillStyle = color;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    const words = text.split(' ');
    let line = '';
    let cy = y;
    for (const word of words) {
      const test = line + word + ' ';
      if (ctx.measureText(test).width > maxW && line) {
        ctx.fillText(line.trim(), x, cy);
        line = word + ' ';
        cy += lineH;
      } else {
        line = test;
      }
    }
    if (line.trim()) ctx.fillText(line.trim(), x, cy);
    return cy + lineH;
  }

  function lerp(a, b, t) { return a + (b - a) * t; }
  function dist(a, b) { return Math.sqrt((a.x - b.x) ** 2 + (a.y - b.y) ** 2); }
  function rectCollide(a, b) {
    return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
  }

  // === PLAYER ===
  let player = { x: 0, y: 0, w: 20, h: 28, vx: 0, vy: 0, dir: 0, speed: 2, walkFrame: 0, character: 'maja' };

  function resetPlayer(x, y, character) {
    player.x = x; player.y = y;
    player.vx = 0; player.vy = 0;
    player.dir = 0; player.walkFrame = 0;
    player.character = character || 'maja';
  }

  function updatePlayer() {
    let dx = 0, dy = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) dx = -1;
    if (keys['ArrowRight'] || keys['KeyD']) dx = 1;
    if (keys['ArrowUp'] || keys['KeyW']) dy = -1;
    if (keys['ArrowDown'] || keys['KeyS']) dy = 1;

    // Touch joystick
    if (touching) {
      const cx = W() / 2, cy = H() - 80;
      const tdx = touchX - cx, tdy = touchY - cy;
      const d = Math.sqrt(tdx * tdx + tdy * tdy);
      if (d > 15) { dx = tdx / d; dy = tdy / d; }
    }

    const len = Math.sqrt(dx * dx + dy * dy);
    if (len > 0) {
      player.vx = (dx / len) * player.speed;
      player.vy = (dy / len) * player.speed;
      player.dir = Math.atan2(dy, dx);
      player.walkFrame += 0.15;
    } else {
      player.vx *= 0.7;
      player.vy *= 0.7;
      if (Math.abs(player.vx) < 0.1) player.vx = 0;
      if (Math.abs(player.vy) < 0.1) player.vy = 0;
    }

    // Collision with walls
    const nx = player.x + player.vx;
    const ny = player.y + player.vy;
    const pb = { x: nx - player.w / 2, y: ny - player.h / 2, w: player.w, h: player.h };

    let blockedX = false, blockedY = false;
    for (const wall of currentLevel.walls || []) {
      const pbx = { x: nx - player.w / 2, y: player.y - player.h / 2, w: player.w, h: player.h };
      const pby = { x: player.x - player.w / 2, y: ny - player.h / 2, w: player.w, h: player.h };
      if (rectCollide(pbx, wall)) blockedX = true;
      if (rectCollide(pby, wall)) blockedY = true;
    }

    if (!blockedX) player.x = nx;
    if (!blockedY) player.y = ny;

    // Keep in bounds
    const lw = currentLevel.width || 800;
    const lh = currentLevel.height || 600;
    player.x = Math.max(player.w / 2, Math.min(lw - player.w / 2, player.x));
    player.y = Math.max(player.h / 2, Math.min(lh - player.h / 2, player.y));
  }

  function drawCharacter(x, y, character, dir, walkFrame, scale) {
    const s = scale || 1;
    const bob = Math.sin(walkFrame * 2) * 2 * s;
    const colors = character === 'maja' ? { skin: COL.maja, hair: COL.majaHair, clothes: COL.majaDress }
      : character === 'ben' ? { skin: COL.ben, hair: COL.benHair, clothes: COL.benShirt }
      : character === 'hilde' ? { skin: COL.hilde, hair: COL.hildeHair, clothes: COL.hildeDress }
      : character === 'soldier' ? { skin: '#8a8a6a', hair: COL.soldierHelm, clothes: COL.soldier }
      : { skin: COL.maja, hair: COL.majaHair, clothes: COL.majaDress };

    ctx.save();
    ctx.translate(x, y + bob);

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 14 * s, 8 * s, 3 * s, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.fillStyle = colors.clothes;
    ctx.fillRect(-6 * s, -2 * s, 12 * s, 16 * s);

    // Head
    ctx.fillStyle = colors.skin;
    ctx.beginPath();
    ctx.arc(0, -8 * s, 7 * s, 0, Math.PI * 2);
    ctx.fill();

    // Hair
    ctx.fillStyle = colors.hair;
    if (character === 'soldier') {
      // Helmet
      ctx.beginPath();
      ctx.ellipse(0, -10 * s, 8 * s, 6 * s, 0, Math.PI, Math.PI * 2);
      ctx.fill();
    } else if (character === 'hilde' || character === 'maja') {
      ctx.beginPath();
      ctx.arc(0, -10 * s, 7 * s, Math.PI * 0.8, Math.PI * 2.2);
      ctx.fill();
      // Long hair sides
      ctx.fillRect(-7 * s, -10 * s, 3 * s, 12 * s);
      ctx.fillRect(4 * s, -10 * s, 3 * s, 12 * s);
    } else {
      ctx.beginPath();
      ctx.arc(0, -10 * s, 7 * s, Math.PI * 0.9, Math.PI * 2.1);
      ctx.fill();
    }

    // Eyes
    const eyeOff = dir !== undefined ? Math.cos(dir) * 2 * s : 0;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-3 * s + eyeOff * 0.5, -8 * s, 1.5 * s, 0, Math.PI * 2);
    ctx.arc(3 * s + eyeOff * 0.5, -8 * s, 1.5 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.arc(-3 * s + eyeOff, -8 * s, 0.8 * s, 0, Math.PI * 2);
    ctx.arc(3 * s + eyeOff, -8 * s, 0.8 * s, 0, Math.PI * 2);
    ctx.fill();

    // Legs (animated)
    ctx.fillStyle = colors.skin;
    const legAnim = Math.sin(walkFrame * 4) * 3 * s;
    ctx.fillRect(-4 * s, 14 * s, 3 * s, 6 * s + (player.vx || player.vy ? legAnim : 0));
    ctx.fillRect(1 * s, 14 * s, 3 * s, 6 * s + (player.vx || player.vy ? -legAnim : 0));

    ctx.restore();
  }

  // === CAMERA ===
  let cam = { x: 0, y: 0 };

  function updateCamera() {
    const targetX = player.x - W() / 2;
    const targetY = player.y - H() / 2;
    cam.x = lerp(cam.x, targetX, 0.1);
    cam.y = lerp(cam.y, targetY, 0.1);
    const lw = currentLevel.width || 800;
    const lh = currentLevel.height || 600;
    cam.x = Math.max(0, Math.min(lw - W(), cam.x));
    cam.y = Math.max(0, Math.min(lh - H(), cam.y));
  }

  // === NPC SYSTEM ===
  let npcs = [];
  let interactTarget = null;

  function addNPC(id, x, y, character, name, dialogues) {
    npcs.push({ id, x, y, character, name, dialogues, dialogueIndex: 0, talked: false });
  }

  function checkNPCInteraction() {
    interactTarget = null;
    for (const npc of npcs) {
      if (dist(player, npc) < 40) {
        interactTarget = npc;
        break;
      }
    }
  }

  function interactWithNPC() {
    if (!interactTarget) return;
    const npc = interactTarget;
    if (npc.dialogueIndex < npc.dialogues.length) {
      showDialogue(npc.name, npc.dialogues[npc.dialogueIndex]);
      npc.dialogueIndex++;
      npc.talked = true;
    }
  }

  // === DIALOGUE SYSTEM ===
  let dialogueQueue = [];
  let currentDialogue = null;
  let dialogueCharIndex = 0;
  let dialogueTimer = 0;
  let dialogueComplete = false;
  let dialogueCallback = null;

  function showDialogue(speaker, text, callback) {
    currentDialogue = { speaker, text };
    dialogueCharIndex = 0;
    dialogueTimer = 0;
    dialogueComplete = false;
    dialogueCallback = callback || null;
    state = STATE.DIALOGUE;
  }

  function queueDialogue(speaker, text) {
    dialogueQueue.push({ speaker, text });
  }

  function queueDialogueWithCallback(speaker, text, callback) {
    dialogueQueue.push({ speaker, text, callback });
  }

  function advanceDialogue() {
    if (!dialogueComplete) {
      dialogueComplete = true;
      dialogueCharIndex = currentDialogue.text.length;
      return;
    }
    if (dialogueCallback) {
      const cb = dialogueCallback;
      dialogueCallback = null;
      currentDialogue = null;
      state = STATE.PLAY;
      cb();
      return;
    }
    if (dialogueQueue.length > 0) {
      const next = dialogueQueue.shift();
      showDialogue(next.speaker, next.text, next.callback);
    } else {
      currentDialogue = null;
      state = STATE.PLAY;
    }
  }

  function updateDialogue() {
    if (!currentDialogue || dialogueComplete) return;
    dialogueTimer += 1;
    if (dialogueTimer % 2 === 0) {
      dialogueCharIndex = Math.min(dialogueCharIndex + 1, currentDialogue.text.length);
      if (dialogueCharIndex >= currentDialogue.text.length) dialogueComplete = true;
    }
  }

  function drawDialogueBox() {
    if (!currentDialogue) return;
    const bw = Math.min(W() - 40, 600);
    const bx = (W() - bw) / 2;
    const by = H() - 140;
    const bh = 120;

    // Box
    ctx.fillStyle = 'rgba(10, 8, 5, 0.92)';
    ctx.strokeStyle = COL.gold;
    ctx.lineWidth = 2;
    roundRect(bx, by, bw, bh, 10);
    ctx.fill();
    ctx.stroke();

    // Speaker
    if (currentDialogue.speaker) {
      ctx.fillStyle = COL.gold;
      ctx.font = '700 14px Nunito, sans-serif';
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(currentDialogue.speaker, bx + 16, by + 12);
    }

    // Text
    const visibleText = currentDialogue.text.substring(0, dialogueCharIndex);
    wrapText(visibleText, bx + 16, by + 34, bw - 32, 22, 15, COL.text, false);

    // Continue indicator
    if (dialogueComplete) {
      const blink = Math.sin(Date.now() * 0.005) > 0;
      if (blink) {
        drawText('▼', bx + bw - 20, by + bh - 16, 14, COL.gold, 'center');
      }
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  // === OBJECTIVE SYSTEM ===
  let objective = '';
  let objectiveAlpha = 0;

  function setObjective(text) {
    objective = text;
    objectiveAlpha = 2; // stays visible then fades
  }

  function drawObjective() {
    if (objectiveAlpha <= 0 || !objective) return;
    const a = Math.min(objectiveAlpha, 1);
    ctx.fillStyle = `rgba(180, 140, 80, ${a})`;
    ctx.font = '600 14px Nunito, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(objective, W() / 2, 16);
    if (objectiveAlpha > 1) objectiveAlpha -= 0.003;
    else objectiveAlpha -= 0.001;
  }

  // === INTERACTION PROMPT ===
  function drawInteractPrompt() {
    if (!interactTarget || state !== STATE.PLAY) return;
    const sx = interactTarget.x - cam.x;
    const sy = interactTarget.y - cam.y - 30;
    const bob = Math.sin(Date.now() * 0.004) * 3;
    drawText('[E] Prata', sx, sy + bob, 12, COL.gold, 'center');
  }

  // === TOUCH CONTROLS ===
  function drawTouchControls() {
    if (!('ontouchstart' in window)) return;
    // Joystick area
    const cx = W() / 2, cy = H() - 80;
    ctx.strokeStyle = 'rgba(180, 140, 80, 0.2)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(cx, cy, 50, 0, Math.PI * 2);
    ctx.stroke();

    if (touching) {
      const dx = touchX - cx, dy = touchY - cy;
      const d = Math.min(Math.sqrt(dx * dx + dy * dy), 40);
      const a = Math.atan2(dy, dx);
      ctx.fillStyle = 'rgba(180, 140, 80, 0.3)';
      ctx.beginPath();
      ctx.arc(cx + Math.cos(a) * d, cy + Math.sin(a) * d, 15, 0, Math.PI * 2);
      ctx.fill();
    }

    // Action button
    ctx.fillStyle = 'rgba(180, 140, 80, 0.15)';
    ctx.strokeStyle = 'rgba(180, 140, 80, 0.3)';
    ctx.beginPath();
    ctx.arc(W() - 60, H() - 80, 25, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    drawText('E', W() - 60, H() - 80, 16, 'rgba(180,140,80,0.5)', 'center');
  }

  // === LEVEL SYSTEM ===
  let currentLevel = {};
  let levelObjects = [];
  let levelTriggers = [];
  let levelEnemies = [];
  let particles = [];

  // === DRAWING: ENVIRONMENT ===
  function drawGround(type) {
    const lw = currentLevel.width || 800;
    const lh = currentLevel.height || 600;
    if (type === 'village') {
      ctx.fillStyle = COL.grass;
      ctx.fillRect(-cam.x, -cam.y, lw, lh);
      // Dirt paths
      for (const path of (currentLevel.paths || [])) {
        ctx.fillStyle = COL.dirt;
        ctx.fillRect(path.x - cam.x, path.y - cam.y, path.w, path.h);
      }
    } else if (type === 'forest') {
      ctx.fillStyle = '#0f1a0f';
      ctx.fillRect(-cam.x, -cam.y, lw, lh);
    } else if (type === 'border') {
      ctx.fillStyle = '#1a1a20';
      ctx.fillRect(-cam.x, -cam.y, lw, lh);
    } else if (type === 'night') {
      ctx.fillStyle = COL.night;
      ctx.fillRect(-cam.x, -cam.y, lw, lh);
    }
  }

  function drawTree(x, y, size) {
    const sx = x - cam.x, sy = y - cam.y;
    const s = size || 1;
    // Trunk
    ctx.fillStyle = COL.trunk;
    ctx.fillRect(sx - 4 * s, sy - 10 * s, 8 * s, 20 * s);
    // Canopy
    ctx.fillStyle = COL.tree;
    ctx.beginPath();
    ctx.arc(sx, sy - 20 * s, 18 * s, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = COL.treeDark;
    ctx.beginPath();
    ctx.arc(sx - 4 * s, sy - 22 * s, 12 * s, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawHouse(x, y, w, h, color) {
    const sx = x - cam.x, sy = y - cam.y;
    // Walls
    ctx.fillStyle = color || COL.wood;
    ctx.fillRect(sx, sy, w, h);
    ctx.strokeStyle = COL.woodDark;
    ctx.lineWidth = 1;
    ctx.strokeRect(sx, sy, w, h);
    // Roof
    ctx.fillStyle = COL.roof;
    ctx.beginPath();
    ctx.moveTo(sx - 5, sy);
    ctx.lineTo(sx + w / 2, sy - 25);
    ctx.lineTo(sx + w + 5, sy);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = COL.roofDark;
    ctx.beginPath();
    ctx.moveTo(sx - 5, sy);
    ctx.lineTo(sx + w / 2, sy - 25);
    ctx.lineTo(sx + w / 2, sy);
    ctx.closePath();
    ctx.fill();
    // Window
    ctx.fillStyle = '#ffdd88';
    ctx.fillRect(sx + w / 2 - 6, sy + 10, 12, 12);
    ctx.strokeStyle = COL.woodDark;
    ctx.strokeRect(sx + w / 2 - 6, sy + 10, 12, 12);
    ctx.beginPath();
    ctx.moveTo(sx + w / 2, sy + 10);
    ctx.lineTo(sx + w / 2, sy + 22);
    ctx.moveTo(sx + w / 2 - 6, sy + 16);
    ctx.lineTo(sx + w / 2 + 6, sy + 16);
    ctx.stroke();
    // Door
    ctx.fillStyle = COL.woodDark;
    ctx.fillRect(sx + w / 2 - 5, sy + h - 18, 10, 18);
  }

  function drawRiver(x, y, w, h) {
    const sx = x - cam.x, sy = y - cam.y;
    ctx.fillStyle = COL.water;
    ctx.fillRect(sx, sy, w, h);
    // Ripples
    const time = Date.now() * 0.002;
    ctx.strokeStyle = COL.waterLight;
    ctx.lineWidth = 1;
    for (let i = 0; i < 5; i++) {
      const rx = sx + 20 + i * (w / 5) + Math.sin(time + i) * 10;
      const ry = sy + h / 2 + Math.cos(time + i * 2) * 5;
      ctx.beginPath();
      ctx.moveTo(rx - 10, ry);
      ctx.quadraticCurveTo(rx, ry - 4, rx + 10, ry);
      ctx.stroke();
    }
  }

  function drawStoneWall(x, y, w, h) {
    const sx = x - cam.x, sy = y - cam.y;
    ctx.fillStyle = COL.stone;
    ctx.fillRect(sx, sy, w, h);
    ctx.fillStyle = COL.stoneDark;
    for (let bx = 0; bx < w; bx += 12) {
      for (let by = 0; by < h; by += 8) {
        const off = (Math.floor(by / 8) % 2) * 6;
        ctx.fillRect(sx + bx + off, sy + by, 11, 7);
        ctx.strokeStyle = '#2a2a2a';
        ctx.lineWidth = 0.5;
        ctx.strokeRect(sx + bx + off, sy + by, 11, 7);
      }
    }
  }

  // === PARTICLES ===
  function spawnParticle(x, y, type) {
    particles.push({
      x, y, type,
      vx: (Math.random() - 0.5) * 2,
      vy: type === 'snow' ? Math.random() * 0.5 + 0.3 : -Math.random() * 2,
      life: 1,
      size: Math.random() * 3 + 1
    });
  }

  function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life -= 0.005;
      if (p.type === 'snow') p.x += Math.sin(Date.now() * 0.001 + i) * 0.3;
      if (p.life <= 0) particles.splice(i, 1);
    }
    // Auto-spawn
    if (currentLevel.particleType === 'snow' && Math.random() < 0.3) {
      spawnParticle(cam.x + Math.random() * W(), cam.y - 10, 'snow');
    }
    if (currentLevel.particleType === 'firefly' && Math.random() < 0.05) {
      spawnParticle(cam.x + Math.random() * W(), cam.y + Math.random() * H(), 'firefly');
    }
  }

  function drawParticles() {
    for (const p of particles) {
      const sx = p.x - cam.x, sy = p.y - cam.y;
      if (p.type === 'snow') {
        ctx.fillStyle = `rgba(255,255,255,${p.life * 0.6})`;
        ctx.beginPath();
        ctx.arc(sx, sy, p.size, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.type === 'firefly') {
        ctx.fillStyle = `rgba(200,180,80,${p.life * 0.5})`;
        ctx.beginPath();
        ctx.arc(sx, sy, p.size * 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // === ENEMY SYSTEM (soldiers) ===
  function updateEnemies() {
    for (const e of levelEnemies) {
      // Patrol movement
      if (e.patrol) {
        e.patrolTimer = (e.patrolTimer || 0) + 1;
        const t = e.patrolTimer * 0.01;
        const pi = e.patrolIndex || 0;
        const target = e.patrol[pi];
        const dx = target.x - e.x, dy = target.y - e.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d < 5) {
          e.patrolIndex = ((e.patrolIndex || 0) + 1) % e.patrol.length;
        } else {
          e.x += (dx / d) * (e.speed || 1);
          e.y += (dy / d) * (e.speed || 1);
          e.dir = Math.atan2(dy, dx);
        }
      }

      // Spotlight / detection
      if (e.spotlight) {
        const dx = player.x - e.x, dy = player.y - e.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        const angle = Math.atan2(dy, dx);
        const spotDir = e.dir || 0;
        const angleDiff = Math.abs(((angle - spotDir + Math.PI * 3) % (Math.PI * 2)) - Math.PI);
        if (d < e.spotRange && angleDiff < e.spotAngle / 2) {
          e.alerted = true;
        }
      }

      // Chase if alerted
      if (e.alerted && !e.stationary) {
        const dx = player.x - e.x, dy = player.y - e.y;
        const d = Math.sqrt(dx * dx + dy * dy);
        if (d > 5) {
          e.x += (dx / d) * (e.speed || 1) * 1.5;
          e.y += (dy / d) * (e.speed || 1) * 1.5;
          e.dir = Math.atan2(dy, dx);
        }
        if (d < 25) {
          // Caught!
          onCaught();
        }
      }

      e.walkFrame = (e.walkFrame || 0) + 0.1;
    }
  }

  function drawEnemies() {
    for (const e of levelEnemies) {
      drawCharacter(e.x - cam.x, e.y - cam.y, 'soldier', e.dir, e.walkFrame || 0, 1);

      // Spotlight cone
      if (e.spotlight) {
        const sx = e.x - cam.x, sy = e.y - cam.y;
        const range = e.spotRange || 100;
        const angle = e.spotAngle || 0.6;
        const dir = e.dir || 0;
        ctx.fillStyle = e.alerted ? 'rgba(200,50,50,0.08)' : 'rgba(255,220,120,0.06)';
        ctx.beginPath();
        ctx.moveTo(sx, sy);
        ctx.arc(sx, sy, range, dir - angle / 2, dir + angle / 2);
        ctx.closePath();
        ctx.fill();
      }
    }
  }

  let caughtCallback = null;
  function onCaught() {
    if (caughtCallback) caughtCallback();
  }

  // === TRIGGER ZONES ===
  function checkTriggers() {
    for (let i = levelTriggers.length - 1; i >= 0; i--) {
      const t = levelTriggers[i];
      if (t.disabled) continue;
      const pb = { x: player.x - player.w / 2, y: player.y - player.h / 2, w: player.w, h: player.h };
      if (rectCollide(pb, t)) {
        t.disabled = true;
        if (t.action) t.action();
      }
    }
  }

  // === STORY SCENES (between playable levels) ===
  let storyLines = [];
  let storyIndex = 0;
  let storyCharIndex = 0;
  let storyComplete = false;
  let storyTimer = 0;
  let storyCallback = null;

  function showStory(lines, callback) {
    storyLines = lines;
    storyIndex = 0;
    storyCharIndex = 0;
    storyComplete = false;
    storyTimer = 0;
    storyCallback = callback;
    state = STATE.STORY;
  }

  function advanceStory() {
    if (!storyComplete) {
      storyComplete = true;
      storyCharIndex = storyLines[storyIndex].text.length;
      return;
    }
    storyIndex++;
    if (storyIndex >= storyLines.length) {
      if (storyCallback) storyCallback();
      return;
    }
    storyCharIndex = 0;
    storyComplete = false;
    storyTimer = 0;
  }

  function updateStory() {
    if (storyComplete) return;
    storyTimer++;
    if (storyTimer % 2 === 0) {
      storyCharIndex = Math.min(storyCharIndex + 1, storyLines[storyIndex].text.length);
      if (storyCharIndex >= storyLines[storyIndex].text.length) storyComplete = true;
    }
  }

  function drawStory() {
    const line = storyLines[storyIndex];
    if (!line) return;

    // Background
    ctx.fillStyle = 'rgba(10, 8, 5, 0.95)';
    ctx.fillRect(0, 0, W(), H());

    // Ambient particles
    const time = Date.now() * 0.001;
    for (let i = 0; i < 20; i++) {
      const px = (Math.sin(time * 0.3 + i * 1.5) * 0.5 + 0.5) * W();
      const py = (Math.cos(time * 0.2 + i * 2.1) * 0.5 + 0.5) * H();
      ctx.fillStyle = `rgba(180,140,80,${0.03 + Math.sin(time + i) * 0.02})`;
      ctx.beginPath();
      ctx.arc(px, py, 2, 0, Math.PI * 2);
      ctx.fill();
    }

    // Speaker name
    const boxW = Math.min(W() - 60, 550);
    const boxX = (W() - boxW) / 2;
    let cy = H() / 2 - 60;

    if (line.speaker) {
      drawText(line.speaker, W() / 2, cy, 16, COL.gold, 'center', null, true);
      cy += 30;
    }

    // Text
    const visibleText = line.text.substring(0, storyCharIndex);
    const endY = wrapText(visibleText, boxX, cy, boxW, 26, 17, COL.text, false);

    // Continue
    if (storyComplete) {
      const blink = Math.sin(Date.now() * 0.005) > 0;
      if (blink) drawText('Tryck för att fortsätta...', W() / 2, H() - 40, 13, COL.textDim, 'center');
    }

    // Progress dots
    const dotY = H() - 70;
    for (let i = 0; i < storyLines.length; i++) {
      ctx.fillStyle = i <= storyIndex ? COL.gold : 'rgba(180,140,80,0.2)';
      ctx.beginPath();
      ctx.arc(W() / 2 + (i - storyLines.length / 2) * 14 + 7, dotY, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // === CHAPTER SYSTEM ===
  let chapterTitleNum = 0;
  let chapterTitleText = '';
  let chapterTimer = 0;
  let chapterTitleCallback = null;
  const CHAPTER_DURATION = 150; // frames total

  function showChapterTitle(num, title, callback) {
    chapterTitleNum = num;
    chapterTitleText = title;
    chapterTimer = 0;
    chapterTitleCallback = callback;
    state = STATE.CHAPTER;
  }

  function updateChapterTitle() {
    chapterTimer++;
    if (chapterTimer >= CHAPTER_DURATION) {
      if (chapterTitleCallback) chapterTitleCallback();
    }
  }

  function drawChapterTitle() {
    ctx.fillStyle = 'rgba(10, 8, 5, 1)';
    ctx.fillRect(0, 0, W(), H());

    // Fade in for first 40 frames, hold, fade out last 30 frames
    let alpha = 1;
    if (chapterTimer < 40) alpha = chapterTimer / 40;
    else if (chapterTimer > CHAPTER_DURATION - 30) alpha = (CHAPTER_DURATION - chapterTimer) / 30;

    ctx.globalAlpha = Math.max(0, Math.min(1, alpha));
    drawText(`KAPITEL ${chapterTitleNum}`, W() / 2, H() / 2 - 20, 14, COL.textDim, 'center', null, false);
    drawText(chapterTitleText, W() / 2, H() / 2 + 15, 32, COL.text, 'center', null, true);
    ctx.globalAlpha = 1;
  }

  // === FADE ===
  let fadeQueue = [];

  function fadeTransition(callback) {
    if (fadeDir !== 0) {
      // Queue it if a fade is already running
      fadeQueue.push(callback);
      return;
    }
    fadeDir = 1;
    fadeAlpha = 0;
    fadeCallback = () => {
      fadeDir = -1;
      callback();
    };
  }

  function updateFade() {
    if (fadeDir === 1) {
      fadeAlpha = Math.min(fadeAlpha + 0.05, 1);
      if (fadeAlpha >= 1 && fadeCallback) {
        const cb = fadeCallback;
        fadeCallback = null;
        cb();
      }
    } else if (fadeDir === -1) {
      fadeAlpha = Math.max(fadeAlpha - 0.05, 0);
      if (fadeAlpha <= 0) {
        fadeDir = 0;
        // Process queued fades
        if (fadeQueue.length > 0) {
          const next = fadeQueue.shift();
          fadeTransition(next);
        }
      }
    }
  }

  function drawFade() {
    if (fadeAlpha > 0) {
      ctx.fillStyle = `rgba(10,8,5,${fadeAlpha})`;
      ctx.fillRect(0, 0, W(), H());
    }
  }

            queueDialogueWithCallback('Svarta Rosen', 'När jag ger tecknet — spring mot skogen! Tillbaka mot Sverige! SPRING!', () => {
              startChapter5();
            });
            advanceDialogue();
          });
        }, 500);
      }
    };

    state = STATE.PLAY;
  }

  function startChapter5() {
    showChapterTitle(5, 'Flykten', () => {
      showStory([
        { speaker: '', text: 'Svarta Rosen kastar en oljelampa mot en av bilarna — den exploderar i lågor!' },
        { speaker: 'Maja', text: 'NU! SPRING!' },
        { speaker: '', text: 'Fly tillbaka till Sverige! Spring mot floden innan soldaterna hinner ifatt er!' },
      ], () => { loadLevel_escape(); });
    });
  }

  function loadLevel_escape() {
    currentLevel = {
      width: 1600, height: 500,
      type: 'night',
      particleType: 'snow',
      paths: [],
      walls: [],
      trees: [],
      houses: []
    };

    // Sparse trees for dodging
    for (let i = 0; i < 20; i++) {
      const tx = 100 + Math.random() * 1400;
      const ty = 50 + Math.random() * 400;
      currentLevel.trees.push({ x: tx, y: ty, size: 0.5 + Math.random() * 0.4 });
      currentLevel.walls.push({ x: tx - 6, y: ty - 4, w: 12, h: 8 });
    }

    currentLevel.river = { x: 1450, y: 0, w: 60, h: 500 };

    npcs = [];
    levelTriggers = [];
    levelEnemies = [];
    particles = [];

    resetPlayer(80, 250, 'maja');
    player.speed = 3; // Running!

    addNPC('hilde_follow', 50, 260, 'hilde', '', []);
    addNPC('ben_follow', 40, 240, 'ben', '', []);

    // Chasing soldiers
    for (let i = 0; i < 3; i++) {
      levelEnemies.push({
        x: 20 + i * 30, y: 200 + i * 40, speed: 2.2, spotlight: false,
        alerted: true, walkFrame: 0, dir: 0
      });
    }

    setObjective('SPRING! Nå floden innan soldaterna hinner ikapp!');

    // Getting shot at — trigger halfway
    levelTriggers.push({
      x: 700, y: 0, w: 50, h: 500,
      action: () => {
        showDialogue('', 'Skott! Kulorna viner genom grenarna! En brännande smärta i armen — men du kan inte stanna!', () => {
          score += 10;
        });
      }
    });

    // Goal
    levelTriggers.push({
      x: 1450, y: 0, w: 60, h: 500,
      action: () => {
        score += 25;
        levelEnemies = []; // Stop chase
        showDialogue('', 'Ni vadar genom det iskalla vattnet. På den svenska sidan kollapsar ni bland träden.', () => {
          queueDialogue('Ben', 'Vi... vi klarade det.');
          queueDialogueWithCallback('', 'Ropen från den norska sidan avtar. Ni är säkra.', () => {
            startEnding();
          });
          advanceDialogue();
        });
      }
    });

    caughtCallback = () => {
      if (state === STATE.DIALOGUE) return;
      showDialogue('', 'Soldaterna kom för nära! Försök igen — spring fortare!', () => {
        player.x = 80; player.y = 250;
        levelEnemies.forEach(e => { e.x = 20; e.y = 200 + Math.random() * 100; e.alerted = true; });
      });
    };

    currentLevel.update = () => {
      const hilde = npcs.find(n => n.id === 'hilde_follow');
      const ben = npcs.find(n => n.id === 'ben_follow');
      if (hilde) {
        hilde.x = lerp(hilde.x, player.x - 20, 0.06);
        hilde.y = lerp(hilde.y, player.y + 8, 0.06);
        hilde.walkFrame = (hilde.walkFrame || 0) + 0.15;
      }
      if (ben) {
        ben.x = lerp(ben.x, player.x - 35, 0.05);
        ben.y = lerp(ben.y, player.y - 8, 0.05);
        ben.walkFrame = (ben.walkFrame || 0) + 0.15;
      }
    };

    state = STATE.PLAY;
  }

  function startEnding() {
    showChapterTitle(6, 'Gryningen', () => {
      showStory([
        { speaker: '', text: 'Gryningsljuset silar genom träden. Majas arm har slutat blöda — Hilde har bundit om den med sitt förkläde.' },
        { speaker: '', text: 'Hemma möter en rasande men lättad pappa dem vid dörren. Han gråter — något Maja aldrig sett.' },
        { speaker: 'Pappa', text: 'Du är modigare än jag, Maja. Modigare än jag.' },
        { speaker: '', text: 'Veckor senare når ett rykte byn: Svarta Rosen lever. Hon fortsätter sitt arbete.' },
        { speaker: '', text: 'De tre vännerna — Svarta Rosorna — sitter vid bäcken och ler mot varandra.' },
        { speaker: '', text: 'De vet att kriget inte är över. Men de vet att vanliga människor kan göra ovanliga saker.' },
      ], () => {
        showEnd();
      });
    });
  }

  function showEnd() {
    state = STATE.END;

    // Post score
    if (score > 0 && window.parent !== window) {
      window.parent.postMessage({ type: 'game-score', score: score }, '*');
    }
  }

  // === DRAW END ===
  function drawEnd() {
    ctx.fillStyle = 'rgba(10, 8, 5, 1)';
    ctx.fillRect(0, 0, W(), H());

    // Particles
    const time = Date.now() * 0.001;
    for (let i = 0; i < 30; i++) {
      const px = (Math.sin(time * 0.2 + i * 1.3) * 0.5 + 0.5) * W();
      const py = (Math.cos(time * 0.15 + i * 1.7) * 0.5 + 0.5) * H();
      ctx.fillStyle = `rgba(180,140,80,${0.04 + Math.sin(time + i) * 0.03})`;
      ctx.beginPath();
      ctx.arc(px, py, 2, 0, Math.PI * 2);
      ctx.fill();
    }

    let title, summary;
    if (score >= 80) {
      title = 'En sann hjälte';
      summary = 'Dina modiga val ledde Svarta Rosorna genom faran. Du visade att även i historiens mörkaste stunder kan vanliga människor göra extraordinära saker.';
    } else if (score >= 50) {
      title = 'Modig vän';
      summary = 'Du valde modets väg och hjälpte dina vänner genom uppdraget. Tillsammans stod ni enade.';
    } else {
      title = 'Överlevare';
      summary = 'Du tog dig igenom. Ibland är det modigaste man kan göra att överleva och berätta sin historia vidare.';
    }

    drawText(title, W() / 2, H() / 2 - 80, 36, COL.text, 'center', null, true);

    const boxW = Math.min(W() - 60, 450);
    wrapText(summary, (W() - boxW) / 2, H() / 2 - 30, boxW, 24, 16, COL.textDim, false);

    drawText(`Mod-poäng: ${score}`, W() / 2, H() / 2 + 50, 20, COL.gold, 'center', null, true);

    const blink = Math.sin(Date.now() * 0.003) > 0;
    if (blink) drawText('Tryck för att spela igen', W() / 2, H() / 2 + 100, 14, COL.textDim, 'center');
  }

  // === TITLE SCREEN ===
  function drawTitle() {
    ctx.fillStyle = 'rgba(10, 8, 5, 1)';
    ctx.fillRect(0, 0, W(), H());

    const time = Date.now() * 0.001;

    // Subtle trees in background
    for (let i = 0; i < 8; i++) {
      const tx = W() * (i + 0.5) / 8;
      const ty = H() * 0.65;
      const s = 1.5 + Math.sin(i * 2.3) * 0.5;
      ctx.fillStyle = `rgba(20, 40, 20, ${0.3 + Math.sin(i) * 0.1})`;
      ctx.beginPath();
      ctx.moveTo(tx - 20 * s, ty + 20);
      ctx.lineTo(tx, ty - 30 * s);
      ctx.lineTo(tx + 20 * s, ty + 20);
      ctx.closePath();
      ctx.fill();
    }

    // Stars
    for (let i = 0; i < 25; i++) {
      const sx = (Math.sin(i * 3.7 + 1) * 0.5 + 0.5) * W();
      const sy = (Math.sin(i * 2.1 + 3) * 0.3 + 0.1) * H();
      const twinkle = (Math.sin(time * 1.5 + i * 2) + 1) * 0.3;
      ctx.fillStyle = `rgba(255,255,240,${twinkle})`;
      ctx.beginPath();
      ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    // Moon
    ctx.fillStyle = 'rgba(232, 220, 200, 0.7)';
    ctx.beginPath();
    ctx.arc(W() * 0.75, H() * 0.2, 25, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(10, 8, 5, 1)';
    ctx.beginPath();
    ctx.arc(W() * 0.75 + 8, H() * 0.2 - 5, 22, 0, Math.PI * 2);
    ctx.fill();

    // Three silhouettes
    const cx = W() / 2, cy = H() * 0.62;
    for (let i = -1; i <= 1; i++) {
      const sx = cx + i * 30;
      ctx.fillStyle = 'rgba(20, 16, 10, 0.9)';
      ctx.beginPath();
      ctx.arc(sx, cy - 12, 6, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillRect(sx - 5, cy - 6, 10, 16);
    }

    // Lantern glow
    ctx.fillStyle = 'rgba(180, 140, 60, 0.06)';
    ctx.beginPath();
    ctx.arc(cx, cy, 40, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255, 180, 60, 0.15)';
    ctx.beginPath();
    ctx.arc(cx, cy + 5, 4, 0, Math.PI * 2);
    ctx.fill();

    drawText('UPPDRAGET', W() / 2, H() * 0.25, Math.min(W() * 0.08, 48), COL.text, 'center', null, true);
    drawText('Svarta Rosorna', W() / 2, H() * 0.25 + 40, 16, COL.gold, 'center', null, false);
    drawText('Baserat på boken av Camilla Lagerqvist', W() / 2, H() * 0.25 + 65, 12, COL.textDim, 'center', null, false);

    const btnBlink = (Math.sin(time * 2) + 1) * 0.15 + 0.7;
    drawText('Tryck för att börja', W() / 2, H() * 0.85, 16, `rgba(180,140,80,${btnBlink})`, 'center', null, true);
  }

  // === DRAW PLAY ===
  function drawPlay() {
    // Sky
    if (currentLevel.type === 'night') {
      ctx.fillStyle = COL.nightSky;
    } else if (currentLevel.type === 'forest') {
      ctx.fillStyle = '#0a0f0a';
    } else {
      ctx.fillStyle = '#2a3a4a';
    }
    ctx.fillRect(0, 0, W(), H());

    // Stars for night
    if (currentLevel.type === 'night') {
      const time = Date.now() * 0.001;
      for (let i = 0; i < 40; i++) {
        const sx = ((i * 137.5) % W());
        const sy = ((i * 97.3) % (H() * 0.4));
        const t = (Math.sin(time + i * 1.7) + 1) * 0.3;
        ctx.fillStyle = `rgba(255,255,240,${t})`;
        ctx.beginPath();
        ctx.arc(sx, sy, 1, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    drawGround(currentLevel.type);

    // River
    if (currentLevel.river) {
      drawRiver(currentLevel.river.x, currentLevel.river.y, currentLevel.river.w, currentLevel.river.h);
    }

    // Houses
    for (const h of (currentLevel.houses || [])) {
      drawHouse(h.x, h.y, h.w, h.h);
      if (h.label) {
        drawText(h.label, h.x + h.w / 2 - cam.x, h.y - 12 - cam.y, 10, COL.textDim, 'center');
      }
    }

    // Paths (dirt)
    for (const p of (currentLevel.paths || [])) {
      ctx.fillStyle = COL.dirt;
      ctx.fillRect(p.x - cam.x, p.y - cam.y, p.w, p.h);
    }

    // Trees (behind player)
    const sortedTrees = [...(currentLevel.trees || [])].sort((a, b) => a.y - b.y);
    for (const t of sortedTrees) {
      if (t.y < player.y) drawTree(t.x, t.y, t.size);
    }

    // NPCs
    for (const npc of npcs) {
      drawCharacter(npc.x - cam.x, npc.y - cam.y, npc.character, npc.dir || 0, npc.walkFrame || 0, 1);
      if (npc.name && dist(player, npc) < 80) {
        drawText(npc.name, npc.x - cam.x, npc.y - cam.y - 28, 11, COL.gold, 'center');
      }
    }

    // Enemies
    drawEnemies();

    // Player
    drawCharacter(player.x - cam.x, player.y - cam.y, player.character, player.dir, player.walkFrame, 1);

    // Trees (in front of player)
    for (const t of sortedTrees) {
      if (t.y >= player.y) drawTree(t.x, t.y, t.size);
    }

    // Particles
    drawParticles();

    // UI
    drawInteractPrompt();
    drawObjective();
    drawTouchControls();

    // Score
    drawText(`Mod: ${score}`, W() - 20, 20, 14, COL.gold, 'right', null, true);

    // Dialogue
    if (state === STATE.DIALOGUE) {
      drawDialogueBox();
    }
  }

  // === MAIN LOOP ===
  function gameLoop() {
    ctx.clearRect(0, 0, W(), H());

    if (state === STATE.TITLE) {
      drawTitle();
    } else if (state === STATE.CHAPTER) {
      updateChapterTitle();
      drawChapterTitle();
    } else if (state === STATE.STORY) {
      updateStory();
      drawStory();
    } else if (state === STATE.PLAY || state === STATE.DIALOGUE) {
      if (state === STATE.PLAY) {
        updatePlayer();
        checkNPCInteraction();
        checkTriggers();
      }
      updateEnemies();
      updateCamera();
      updateParticles();
      if (currentLevel.update) currentLevel.update();
      if (state === STATE.DIALOGUE) updateDialogue();
      drawPlay();
    } else if (state === STATE.END) {
      drawEnd();
    }

    updateFade();
    drawFade();

    requestAnimationFrame(gameLoop);
  }

  // === INPUT HANDLER ===
  function handleAction() {
    if (state === STATE.TITLE && titleReady) {
      startChapter1();
    } else if (state === STATE.STORY) {
      advanceStory();
    } else if (state === STATE.DIALOGUE) {
      advanceDialogue();
    } else if (state === STATE.PLAY) {
      if (interactTarget) interactWithNPC();
    } else if (state === STATE.END) {
      // Restart
      score = 0;
      state = STATE.TITLE;
      titleReady = true;
    }
  }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'Enter' || e.code === 'KeyE') {
      handleAction();
    }
  });

  canvas.addEventListener('mousedown', e => {
    // Check touch action button area
    if ('ontouchstart' in window) {
      const abx = W() - 60, aby = H() - 80;
      if (Math.sqrt((e.clientX - abx) ** 2 + (e.clientY - aby) ** 2) < 30) {
        handleAction();
        return;
      }
    }
    if (state !== STATE.PLAY) handleAction();
  });

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.touches[0];
    const abx = W() - 60, aby = H() - 80;
    if (Math.sqrt((t.clientX - abx) ** 2 + (t.clientY - aby) ** 2) < 35) {
      handleAction();
      return;
    }
    if (state !== STATE.PLAY) handleAction();
  }, { passive: false });

  // === START ===
  gameLoop();
})();
</script>
</body>
</html>
