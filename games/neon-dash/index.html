<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Neon Dash</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      overflow: hidden;
      font-family: 'Segoe UI', 'Nunito', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    canvas { display: block; width: 100vw; height: 100vh; outline: none; }
  </style>
</head>
<body>
<canvas id="game" tabindex="0"></canvas>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  canvas.focus();
  window.addEventListener('load', () => canvas.focus());

  // --- Hi-DPI ---
  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  const W = () => window.innerWidth;
  const H = () => window.innerHeight;

  // --- Colors ---
  const NEON_BLUE = '#00d4ff';
  const NEON_PURPLE = '#a855f7';
  const NEON_PINK = '#ff2d95';
  const NEON_GREEN = '#39ff14';
  const NEON_ORANGE = '#ff6a00';
  const BG_DARK = '#0a0a1a';

  // --- Skin System ---
  const SKIN_DATA = {
    default:  { primary: '#00d4ff', secondary: '#ffffff', trail: '#00d4ff', glow: '#00d4ff', glowStyle: 'normal' },
    crimson:  { primary: '#ff2d55', secondary: '#ffaacc', trail: '#ff2d55', glow: '#ff2d55', glowStyle: 'normal' },
    emerald:  { primary: '#39ff14', secondary: '#ccffcc', trail: '#39ff14', glow: '#39ff14', glowStyle: 'normal' },
    sunset:   { primary: '#ff6a00', secondary: '#ffdd44', trail: '#ff8c00', glow: '#ff6a00', glowStyle: 'normal' },
    phantom:  { primary: '#a855f7', secondary: '#e0ccff', trail: '#a855f7', glow: '#a855f7', glowStyle: 'pulse' },
    arctic:   { primary: '#88eeff', secondary: '#ffffff', trail: '#aaeeff', glow: '#88eeff', glowStyle: 'frost' },
    golden:   { primary: '#fbbf24', secondary: '#fff8e0', trail: '#fbbf24', glow: '#fbbf24', glowStyle: 'normal' },
    inferno:  { primary: '#ff4400', secondary: '#ff8800', trail: '#ff2200', glow: '#ff4400', glowStyle: 'flicker' },
    void:     { primary: '#1a0033', secondary: '#6600cc', trail: '#3300aa', glow: '#6600cc', glowStyle: 'reverse' },
    rainbow:  { primary: 'rainbow', secondary: '#ffffff', trail: 'rainbow', glow: 'rainbow', glowStyle: 'rainbow' },
    'corny-choklad':  { primary: '#6B3410', secondary: '#D4A574', trail: '#8B4513', glow: '#A0522D', glowStyle: 'normal' },
    'corny-mork':     { primary: '#3D1C00', secondary: '#8B6914', trail: '#5C2E00', glow: '#5C2E00', glowStyle: 'normal' },
    'corny-vit':      { primary: '#FFF8DC', secondary: '#FFD700', trail: '#FAEBD7', glow: '#FFD700', glowStyle: 'normal' },
    'corny-kokos':    { primary: '#F5F5DC', secondary: '#8B7355', trail: '#FFDEAD', glow: '#DEB887', glowStyle: 'normal' },
    'corny-banan':    { primary: '#FFD700', secondary: '#8B6914', trail: '#FFA500', glow: '#FFD700', glowStyle: 'normal' },
    'corny-jordnot':  { primary: '#C4A265', secondary: '#8B6914', trail: '#B8860B', glow: '#DAA520', glowStyle: 'normal' },
    'corny-jordgubb': { primary: '#FF69B4', secondary: '#FFF0F5', trail: '#FF1493', glow: '#FF69B4', glowStyle: 'normal' },
    'corny-brownie':  { primary: '#4A2000', secondary: '#A0522D', trail: '#7B3F00', glow: '#8B4513', glowStyle: 'normal' },
    'corny-karamell': { primary: '#DAA520', secondary: '#FFE4B5', trail: '#D4A574', glow: '#DAA520', glowStyle: 'normal' },
  };

  // --- Corny Images ---
  const cornyImages = {};
  function loadCornyImg(id, filename) {
    const img = new Image();
    img._loaded = false;
    const paths = ['../../images/' + filename, '/images/' + filename];
    let idx = 0;
    img.onload = () => { img._loaded = true; };
    img.onerror = () => { idx++; if (idx < paths.length) img.src = paths[idx]; };
    img.src = paths[0];
    cornyImages[id] = img;
  }
  loadCornyImg('corny-choklad', 'corny-choklad.png');
  loadCornyImg('corny-mork', 'corny-mork.png');
  loadCornyImg('corny-vit', 'corny-vit.png');
  loadCornyImg('corny-kokos', 'corny-kokos.png');
  loadCornyImg('corny-banan', 'corny-banan.png');
  loadCornyImg('corny-jordnot', 'corny-jordnot.png');
  loadCornyImg('corny-jordgubb', 'corny-jordgubb.png');
  loadCornyImg('corny-brownie', 'corny-brownie.png');
  loadCornyImg('corny-karamell', 'corny-karamell.png');

  let skinPrimary = NEON_BLUE;
  let skinSecondary = '#ffffff';
  let skinTrail = NEON_BLUE;
  let skinGlow = NEON_BLUE;
  let skinGlowStyle = 'normal';

  let _equippedSkinId = 'default';
  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'skin-data') {
      _equippedSkinId = e.data.skinId || 'default';
      loadSkin();
    }
  });

  function getEquippedSkinId() {
    return _equippedSkinId;
  }

  function loadSkin() {
    const id = getEquippedSkinId();
    const skin = SKIN_DATA[id] || SKIN_DATA.default;
    skinGlowStyle = skin.glowStyle;
    if (skin.primary === 'rainbow') {
      const hue = (Date.now() / 15) % 360;
      skinPrimary = `hsl(${hue}, 100%, 55%)`;
      skinSecondary = '#ffffff';
      skinTrail = `hsl(${(hue + 60) % 360}, 100%, 55%)`;
      skinGlow = `hsl(${hue}, 100%, 55%)`;
    } else {
      skinPrimary = skin.primary;
      skinSecondary = skin.secondary;
      skinTrail = skin.trail;
      skinGlow = skin.glow;
    }
  }

  // ========== GAME STATES ==========
  const STATE = { MENU: 0, MODE_SELECT: 1, PLAYING: 2, DEAD: 3 };
  let state = STATE.MENU;

  // ========== GAME MODES ==========
  const MODE = { WAVE: 'wave', SHIP: 'ship', BALL: 'ball', UFO: 'ufo', SWING: 'swing' };
  let gameMode = MODE.WAVE;
  let selectedModeIndex = 0;

  const MODE_LIST = [
    { id: MODE.WAVE,  label: 'Wave',  icon: '〰', color: NEON_BLUE,   desc: 'Zigzag-kontroll' },
    { id: MODE.SHIP,  label: 'Ship',  icon: '▲', color: NEON_GREEN,  desc: 'Flyg med momentum' },
    { id: MODE.BALL,  label: 'Ball',  icon: '●', color: NEON_PURPLE, desc: 'Vänd gravitation' },
    { id: MODE.UFO,   label: 'UFO',   icon: '◎', color: NEON_ORANGE, desc: 'Tryck för boost' },
    { id: MODE.SWING, label: 'Swing', icon: '⌁', color: NEON_PINK,  desc: 'Pendel-fysik' },
  ];

  // ========== GAME VARIABLES ==========
  let score = 0;
  function getHighScoreKey() { return 'neondash-hs-' + gameMode; }
  function getHighScore() { return parseInt(localStorage.getItem(getHighScoreKey()) || '0'); }
  function setHighScore(v) { localStorage.setItem(getHighScoreKey(), v.toString()); }
  let holding = false;
  let tapped = false; // single-tap detection for ball/ufo/swing
  let gameSpeed = 3.5;
  let baseSpeed = 3.5;
  let distance = 0;
  let shakeTimer = 0;
  let flashTimer = 0;
  let deathParticles = [];
  let menuPulse = 0;
  let gravityDir = 1; // 1 = down, -1 = up (for ball/swing)

  // Player
  const player = {
    x: 0, y: 0, vy: 0,
    size: 14,
    trail: [],  // {x, y} positions
    alive: true
  };

  // World
  let obstacles = [];
  let stars = [];
  let bgParticles = [];

  // Tunnel
  const TUNNEL_MARGIN = 65;
  const tunnelTop = () => TUNNEL_MARGIN;
  const tunnelBottom = () => H() - TUNNEL_MARGIN;
  const tunnelHeight = () => tunnelBottom() - tunnelTop();

  // ========== HELPERS ==========
  function hexToRgba(hex, a) {
    if (hex.startsWith('hsl')) return hex.replace(')', `, ${a})`).replace('hsl(', 'hsla(');
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${a})`;
  }

  function drawGlow(x, y, radius, color, alpha) {
    const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
    grad.addColorStop(0, hexToRgba(color, alpha));
    grad.addColorStop(1, hexToRgba(color, 0));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // ========== INIT ==========
  function initPlayer() {
    player.x = W() * 0.18;
    player.y = H() / 2;
    player.vy = 0;
    player.trail = [];
    player.alive = true;
  }

  function initStars() {
    stars = [];
    for (let i = 0; i < 120; i++) {
      stars.push({
        x: Math.random() * W(), y: Math.random() * H(),
        size: Math.random() * 2 + 0.3, speed: Math.random() * 1.5 + 0.5,
        brightness: Math.random()
      });
    }
  }

  function initBgParticles() {
    bgParticles = [];
    for (let i = 0; i < 25; i++) {
      bgParticles.push({
        x: Math.random() * W(), y: Math.random() * H(),
        size: Math.random() * 3 + 1, speed: Math.random() * 0.8 + 0.2,
        hue: Math.random() * 60 + 220, alpha: Math.random() * 0.2 + 0.05
      });
    }
  }

  // ========== OBSTACLE GENERATION ==========
  // Track the last safe zone so next obstacle is always reachable
  let lastSafeY = 0;      // center of last safe passage
  let lastObstacleX = 0;  // x position of last obstacle

  function generateEndlessObstacle(x) {
    const difficulty = Math.min(distance / 3500, 1);
    const tH = tunnelHeight();
    const tTop = tunnelTop();
    const tBot = tunnelBottom();
    const ps = player.size;
    const colPS = ps * 0.6; // collision radius (must match checkCollision)

    // Minimum safe gap the player can fit through (generous)
    const MIN_GAP = ps * 7;

    // How far can the player move vertically between obstacles?
    // Use 0.7x because player may need to change direction mid-flight
    const horizDist = x - lastObstacleX;
    const verticalReach = horizDist > 0 ? horizDist * 0.7 : tH;

    let type;
    const roll = Math.random();

    // Mode-specific obstacle distribution
    switch (gameMode) {
      case MODE.WAVE:
        // Tight zigzag: lots of gaps and spikes
        if (difficulty < 0.2) {
          type = roll < 0.55 ? 'gap' : (roll < 0.8 ? 'spikes_top' : 'spikes_bottom');
        } else if (difficulty < 0.5) {
          type = roll < 0.3 ? 'gap' : (roll < 0.5 ? 'spikes_top' : (roll < 0.7 ? 'spikes_bottom' : (roll < 0.85 ? 'spikes_both' : 'pillars')));
        } else {
          const wt = ['gap', 'spikes_top', 'spikes_bottom', 'spikes_both', 'pillars'];
          type = wt[Math.floor(Math.random() * wt.length)];
        }
        break;
      case MODE.SHIP:
        // Momentum flight: more open gaps, spikes on one side, pillars
        if (difficulty < 0.3) {
          type = roll < 0.4 ? 'gap' : (roll < 0.7 ? 'spikes_top' : 'spikes_bottom');
        } else {
          type = roll < 0.25 ? 'gap' : (roll < 0.45 ? 'spikes_top' : (roll < 0.65 ? 'spikes_bottom' : (roll < 0.8 ? 'pillars' : 'spikes_both')));
        }
        break;
      case MODE.BALL:
        // Floor/ceiling based: spikes on surfaces you need to avoid, pillars in middle
        if (difficulty < 0.3) {
          type = roll < 0.4 ? 'spikes_top' : (roll < 0.8 ? 'spikes_bottom' : 'pillars');
        } else {
          type = roll < 0.3 ? 'spikes_top' : (roll < 0.6 ? 'spikes_bottom' : (roll < 0.85 ? 'pillars' : 'spikes_both'));
        }
        break;
      case MODE.UFO:
        // Flappy-style: mostly vertical walls with gaps
        if (difficulty < 0.3) {
          type = roll < 0.7 ? 'gap' : (roll < 0.85 ? 'spikes_top' : 'spikes_bottom');
        } else {
          type = roll < 0.5 ? 'gap' : (roll < 0.65 ? 'spikes_top' : (roll < 0.8 ? 'spikes_bottom' : (roll < 0.9 ? 'pillars' : 'spikes_both')));
        }
        break;
      case MODE.SWING:
        // Pendulum: wider passages, more pillars to weave around
        if (difficulty < 0.3) {
          type = roll < 0.35 ? 'gap' : (roll < 0.65 ? 'pillars' : (roll < 0.85 ? 'spikes_top' : 'spikes_bottom'));
        } else {
          type = roll < 0.25 ? 'gap' : (roll < 0.55 ? 'pillars' : (roll < 0.7 ? 'spikes_top' : (roll < 0.85 ? 'spikes_bottom' : 'spikes_both')));
        }
        break;
      default:
        type = roll < 0.4 ? 'gap' : (roll < 0.6 ? 'spikes_top' : (roll < 0.8 ? 'spikes_bottom' : 'pillars'));
    }

    // Calculate reachable Y range from last safe position
    const reachMin = Math.max(tTop + colPS, lastSafeY - verticalReach);
    const reachMax = Math.min(tBot - colPS, lastSafeY + verticalReach);

    let ob;

    switch (type) {
      case 'gap': {
        // Mode-specific gap sizes
        let baseGap = 160, gapShrink = 40;
        switch (gameMode) {
          case MODE.WAVE:  baseGap = 155; gapShrink = 38; break;
          case MODE.SHIP:  baseGap = 180; gapShrink = 35; break;
          case MODE.BALL:  baseGap = 190; gapShrink = 30; break;
          case MODE.UFO:   baseGap = 170; gapShrink = 35; break;
          case MODE.SWING: baseGap = 200; gapShrink = 30; break;
        }
        const gapSize = Math.max(MIN_GAP, baseGap - gapShrink * difficulty);
        // Place gap center within reachable range
        const gapMin = Math.max(tTop + gapSize / 2, reachMin);
        const gapMax = Math.min(tBot - gapSize / 2, reachMax);
        const gapY = gapMin + Math.random() * Math.max(0, gapMax - gapMin);
        ob = { type: 'gap', x, width: 28 + Math.random() * 18, gapY, gapSize, color: NEON_PURPLE };
        lastSafeY = gapY;
        break;
      }
      case 'spikes_top': {
        // Player survives when: py - colPS >= tTop + spikeHeight
        // So safe zone starts at tTop + spikeHeight + colPS
        // Max spike height: player must be able to reach below the spikes
        const maxReachable = reachMax - colPS - tTop; // max spike height player can get below
        const desiredH = (0.15 + Math.random() * 0.2 * (1 + difficulty * 0.5)) * tH;
        const h = Math.max(20, Math.min(desiredH, tH - MIN_GAP, maxReachable));
        ob = { type: 'spikes_top', x, width: 45 + Math.random() * 25, spikeHeight: h, color: NEON_PINK };
        // Safe position: just below the spikes (with margin)
        lastSafeY = Math.max(reachMin, Math.min(reachMax, tTop + h + colPS + MIN_GAP / 3));
        break;
      }
      case 'spikes_bottom': {
        // Player survives when: py + colPS <= tBot - spikeHeight
        // So safe zone ends at tBot - spikeHeight - colPS
        const maxReachable = tBot - reachMin - colPS; // max spike height player can get above
        const desiredH = (0.15 + Math.random() * 0.2 * (1 + difficulty * 0.5)) * tH;
        const h = Math.max(20, Math.min(desiredH, tH - MIN_GAP, maxReachable));
        ob = { type: 'spikes_bottom', x, width: 45 + Math.random() * 25, spikeHeight: h, color: NEON_PINK };
        // Safe position: just above the spikes (with margin)
        lastSafeY = Math.max(reachMin, Math.min(reachMax, tBot - h - colPS - MIN_GAP / 3));
        break;
      }
      case 'spikes_both': {
        // Player survives when: py - colPS >= tTop + topH AND py + colPS <= tBot - botH
        // Safe zone: [tTop + topH + colPS, tBot - botH - colPS]
        const maxEach = (tH - MIN_GAP) / 2;
        let topH = Math.min((0.1 + Math.random() * 0.12 * (1 + difficulty * 0.3)) * tH, maxEach);
        let botH = Math.min((0.1 + Math.random() * 0.12 * (1 + difficulty * 0.3)) * tH, maxEach);
        // Ensure safe zone overlaps with reachable range
        let safeTop = tTop + topH + colPS;
        let safeBot = tBot - botH - colPS;
        // If safe zone doesn't overlap with reachable range, shrink spikes
        if (safeTop > reachMax || safeBot < reachMin) {
          topH = Math.max(10, reachMin - tTop - colPS);
          botH = Math.max(10, tBot - reachMax - colPS);
          if (topH < 10) topH = 10;
          if (botH < 10) botH = 10;
          safeTop = tTop + topH + colPS;
          safeBot = tBot - botH - colPS;
        }
        // Double check: remaining gap
        const remaining = tH - topH - botH;
        if (remaining < MIN_GAP) {
          const scale = (tH - MIN_GAP) / (topH + botH);
          topH *= scale;
          botH *= scale;
        }
        ob = { type: 'spikes_both', x, width: 45 + Math.random() * 20,
          topHeight: topH, bottomHeight: botH, color: NEON_ORANGE };
        // Safe zone is the middle of the gap
        const gapCenter = tTop + ob.topHeight + colPS + (tH - ob.topHeight - ob.bottomHeight - colPS * 2) / 2;
        lastSafeY = Math.max(reachMin, Math.min(reachMax, gapCenter));
        break;
      }
      case 'pillars': {
        const pillarH = 35 + Math.random() * 30;
        const pillarW = 22 + Math.random() * 10;

        // Place pillar so the safe passage is within reach
        let py;
        if (lastSafeY < tTop + tH / 2) {
          // Player is in upper half — place pillar below player, safe zone above
          const minPy = Math.max(tTop + 10, lastSafeY + colPS + MIN_GAP / 2);
          py = minPy + Math.random() * Math.max(0, tBot - pillarH - 10 - minPy);
          lastSafeY = Math.max(reachMin, Math.min(reachMax, py - colPS - MIN_GAP / 3));
        } else {
          // Player is in lower half — place pillar above player, safe zone below
          const maxPy = Math.min(tBot - pillarH - 10, lastSafeY - colPS - MIN_GAP / 2);
          py = tTop + 10 + Math.random() * Math.max(0, maxPy - tTop - 10);
          lastSafeY = Math.max(reachMin, Math.min(reachMax, py + pillarH + colPS + MIN_GAP / 3));
        }

        ob = { type: 'pillars', x, width: pillarW, pillars: [{ offsetX: 0, y: py, height: pillarH, width: pillarW }], color: NEON_BLUE };
        break;
      }
    }

    lastObstacleX = x;
    return ob;
  }

  // Mode-specific obstacle spacing
  function getModeSpacing() {
    switch (gameMode) {
      case MODE.WAVE:  return { base: 250, rand: 150, shrink: 0.003, maxShrink: 40, floor: 210 };
      case MODE.SHIP:  return { base: 280, rand: 160, shrink: 0.002, maxShrink: 35, floor: 240 };
      case MODE.BALL:  return { base: 220, rand: 120, shrink: 0.003, maxShrink: 30, floor: 190 };
      case MODE.UFO:   return { base: 300, rand: 140, shrink: 0.002, maxShrink: 40, floor: 250 };
      case MODE.SWING: return { base: 320, rand: 160, shrink: 0.002, maxShrink: 35, floor: 270 };
      default: return { base: 250, rand: 150, shrink: 0.003, maxShrink: 40, floor: 210 };
    }
  }

  function generateInitialEndless() {
    lastSafeY = H() / 2;
    lastObstacleX = W() * 0.2;
    const sp = getModeSpacing();
    let x = W() * 0.7;
    while (x < W() * 3) {
      obstacles.push(generateEndlessObstacle(x));
      x += sp.base + Math.random() * sp.rand;
    }
  }

  // ========== RESET ==========
  function startGame(mode) {
    gameMode = mode;
    score = 0;
    distance = 0;
    deathParticles = [];
    shakeTimer = 0;
    flashTimer = 0;
    obstacles = [];
    gravityDir = 1;
    tapped = false;

    // Mode-specific base speeds
    switch (mode) {
      case MODE.WAVE:  baseSpeed = 3.5; break;
      case MODE.SHIP:  baseSpeed = 3.2; break;
      case MODE.BALL:  baseSpeed = 3.8; break;
      case MODE.UFO:   baseSpeed = 3.0; break;
      case MODE.SWING: baseSpeed = 3.0; break;
      default: baseSpeed = 3.5;
    }
    gameSpeed = baseSpeed;
    generateInitialEndless();

    initPlayer();
    // Ball starts on the floor
    if (mode === MODE.BALL) {
      player.y = tunnelBottom() - player.size;
      player.vy = 0;
    }
    loadSkin();
    state = STATE.PLAYING;
  }

  // ========== INPUT ==========
  let lastScreenChange = 0;
  const SCREEN_DELAY = 400; // ms — ignore clicks for 400ms after screen change

  function screenReady() {
    return Date.now() - lastScreenChange > SCREEN_DELAY;
  }

  function goToModeSelect() {
    state = STATE.MODE_SELECT;
    selectedModeIndex = 0;
    lastScreenChange = Date.now();
  }

  function selectMode(idx) {
    selectedModeIndex = idx;
    startGame(MODE_LIST[idx].id);
  }

  // Gameplay hold/release
  function onDown(e) {
    if (e) e.preventDefault();
    canvas.focus();
    holding = true;
    tapped = true;
  }

  function onUp(e) {
    if (e) e.preventDefault();
    holding = false;
  }

  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mouseup', onUp);
  canvas.addEventListener('touchstart', onDown, { passive: false });
  canvas.addEventListener('touchend', onUp, { passive: false });

  // Screen transitions — shared handler for click and tap
  function handleScreenTap(clientX, clientY) {
    if (!screenReady()) return;

    if (state === STATE.MENU) {
      goToModeSelect();
      return;
    }

    if (state === STATE.DEAD && shakeTimer <= 0) {
      goToModeSelect();
      return;
    }

    if (state === STATE.MODE_SELECT) {
      const items = MODE_LIST;
      const cardW = 120;
      const cardGap = 16;
      const totalW = items.length * cardW + (items.length - 1) * cardGap;
      const sx = W() / 2 - totalW / 2;
      const cy = H() / 2 + 10;

      for (let i = 0; i < items.length; i++) {
        const bx = sx + i * (cardW + cardGap);
        if (clientX >= bx && clientX <= bx + cardW && clientY >= cy - 55 && clientY <= cy + 55) {
          selectMode(i);
          return;
        }
      }
    }
  }

  canvas.addEventListener('click', (e) => {
    handleScreenTap(e.clientX, e.clientY);
  });

  // Touch tap — touchend fires even when click is prevented
  let touchStartPos = null;
  canvas.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    touchStartPos = { x: t.clientX, y: t.clientY };
  }, { passive: true });

  canvas.addEventListener('touchend', (e) => {
    if (!touchStartPos) return;
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartPos.x;
    const dy = t.clientY - touchStartPos.y;
    // Only count as tap if finger didn't move much
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) {
      handleScreenTap(t.clientX, t.clientY);
    }
    touchStartPos = null;
  }, { passive: true });

  // Keyboard
  function handleKeyDown(e) {
    // Gameplay hold
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault();
      if (!e.repeat) { holding = true; tapped = true; }
    }

    if (!screenReady()) return;

    // Screen transitions on Space/Enter
    if (e.code === 'Space' || e.code === 'Enter') {
      if (state === STATE.MENU) { goToModeSelect(); return; }
      if (state === STATE.DEAD && shakeTimer <= 0) { goToModeSelect(); return; }
    }

    // Mode select navigation
    if (state === STATE.MODE_SELECT) {
      const items = MODE_LIST;
      if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
        e.preventDefault();
        selectedModeIndex = (selectedModeIndex - 1 + items.length) % items.length;
      }
      if (e.code === 'ArrowRight' || e.code === 'KeyD') {
        e.preventDefault();
        selectedModeIndex = (selectedModeIndex + 1) % items.length;
      }
      if (e.code === 'Enter') {
        e.preventDefault();
        selectMode(selectedModeIndex);
      }
    }
  }

  function handleKeyUp(e) {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault();
      holding = false;
    }
  }

  canvas.addEventListener('keydown', handleKeyDown);
  canvas.addEventListener('keyup', handleKeyUp);
  document.addEventListener('keydown', handleKeyDown);
  document.addEventListener('keyup', handleKeyUp);

  // ========== COLLISION ==========
  function checkCollision() {
    const px = player.x, py = player.y, ps = player.size * 0.6;

    // NO wall death — walls just clamp
    for (const ob of obstacles) {
      if (ob.type === 'finish') continue;
      switch (ob.type) {
        case 'gap':
          if (px + ps > ob.x && px - ps < ob.x + ob.width) {
            if (py - ps < ob.gapY - ob.gapSize / 2 || py + ps > ob.gapY + ob.gapSize / 2) return true;
          }
          break;
        case 'spikes_top':
          if (px + ps > ob.x && px - ps < ob.x + ob.width) {
            if (py - ps < tunnelTop() + ob.spikeHeight) return true;
          }
          break;
        case 'spikes_bottom':
          if (px + ps > ob.x && px - ps < ob.x + ob.width) {
            if (py + ps > tunnelBottom() - ob.spikeHeight) return true;
          }
          break;
        case 'spikes_both':
          if (px + ps > ob.x && px - ps < ob.x + ob.width) {
            if (py - ps < tunnelTop() + ob.topHeight || py + ps > tunnelBottom() - ob.bottomHeight) return true;
          }
          break;
        case 'pillars':
          for (const pil of ob.pillars) {
            const pilX = ob.x + pil.offsetX;
            if (px + ps > pilX && px - ps < pilX + pil.width) {
              if (py + ps > pil.y && py - ps < pil.y + pil.height) return true;
            }
          }
          break;
      }
    }
    return false;
  }

  // ========== DEATH ==========
  function die() {
    player.alive = false;
    state = STATE.DEAD;
    shakeTimer = 20;
    flashTimer = 8;
    if (score > getHighScore()) {
      setHighScore(score);
    }
    // Send score to parent for coin rewards
    if (score > 0 && window.parent !== window) {
      window.parent.postMessage({ type: 'game-score', score: score }, '*');
    }
    for (let i = 0; i < 40; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 7 + 2;
      deathParticles.push({
        x: player.x, y: player.y,
        vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed,
        size: Math.random() * 4 + 2, life: 1,
        decay: Math.random() * 0.03 + 0.01, color: skinPrimary
      });
    }
  }

  // ========== DRAWING ==========

  function drawBackground() {
    ctx.fillStyle = BG_DARK;
    ctx.fillRect(0, 0, W(), H());

    // Grid inside tunnel
    ctx.strokeStyle = 'rgba(30,30,80,0.15)';
    ctx.lineWidth = 0.5;
    const gridSize = 50;
    const offsetX = (distance * 0.5) % gridSize;
    for (let x = -offsetX; x < W(); x += gridSize) {
      ctx.beginPath(); ctx.moveTo(x, tunnelTop()); ctx.lineTo(x, tunnelBottom()); ctx.stroke();
    }
    for (let y = tunnelTop(); y <= tunnelBottom(); y += gridSize) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W(), y); ctx.stroke();
    }

    // Stars everywhere
    for (const star of stars) {
      star.x -= star.speed * (gameSpeed / baseSpeed);
      if (star.x < 0) { star.x = W(); star.y = Math.random() * H(); }
      const tw = 0.3 + 0.4 * Math.sin(Date.now() * 0.003 + star.brightness * 10);
      ctx.fillStyle = `rgba(255,255,255,${tw})`;
      ctx.beginPath(); ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2); ctx.fill();
    }

    // BG particles
    for (const p of bgParticles) {
      p.x -= p.speed * (gameSpeed / baseSpeed);
      if (p.x < -10) { p.x = W() + 10; p.y = Math.random() * H(); }
      ctx.fillStyle = `hsla(${p.hue}, 80%, 60%, ${p.alpha})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
    }

    // Dark outside tunnel
    ctx.fillStyle = 'rgba(0,0,0,0.55)';
    ctx.fillRect(0, 0, W(), tunnelTop());
    ctx.fillRect(0, tunnelBottom(), W(), H() - tunnelBottom());

    // Tunnel borders
    const pulse = 0.7 + 0.3 * Math.sin(Date.now() * 0.002);

    ctx.shadowColor = NEON_BLUE;
    ctx.shadowBlur = 15;
    ctx.strokeStyle = hexToRgba(NEON_BLUE, pulse);
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, tunnelTop()); ctx.lineTo(W(), tunnelTop()); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, tunnelBottom()); ctx.lineTo(W(), tunnelBottom()); ctx.stroke();
    ctx.shadowBlur = 0;

    // Thin secondary lines
    ctx.strokeStyle = hexToRgba(NEON_BLUE, pulse * 0.2);
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, tunnelTop() + 4); ctx.lineTo(W(), tunnelTop() + 4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, tunnelBottom() - 4); ctx.lineTo(W(), tunnelBottom() - 4); ctx.stroke();
  }

  // --- Obstacles ---
  function drawSpikesTop(x, width, height, color) {
    const spikeW = width / 3;
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(x + i * spikeW, tunnelTop());
      ctx.lineTo(x + i * spikeW + spikeW / 2, tunnelTop() + height);
      ctx.lineTo(x + (i + 1) * spikeW, tunnelTop());
      ctx.closePath();
      ctx.fill();
    }
    ctx.fillRect(x, tunnelTop(), width, 3);
    ctx.shadowBlur = 0;
  }

  function drawSpikesBottom(x, width, height, color) {
    const spikeW = width / 3;
    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(x + i * spikeW, tunnelBottom());
      ctx.lineTo(x + i * spikeW + spikeW / 2, tunnelBottom() - height);
      ctx.lineTo(x + (i + 1) * spikeW, tunnelBottom());
      ctx.closePath();
      ctx.fill();
    }
    ctx.fillRect(x, tunnelBottom() - 3, width, 3);
    ctx.shadowBlur = 0;
  }

  function drawObstacles() {
    for (const ob of obstacles) {
      if (ob.type === 'finish') {
        // Finish line
        const pulse = 0.6 + 0.4 * Math.sin(Date.now() * 0.004);
        ctx.strokeStyle = hexToRgba(NEON_GREEN, pulse);
        ctx.shadowColor = NEON_GREEN;
        ctx.shadowBlur = 15;
        ctx.lineWidth = 3;
        ctx.setLineDash([8, 8]);
        ctx.beginPath(); ctx.moveTo(ob.x, tunnelTop()); ctx.lineTo(ob.x, tunnelBottom()); ctx.stroke();
        ctx.setLineDash([]);
        ctx.shadowBlur = 0;

        // "FINISH" text
        ctx.fillStyle = hexToRgba(NEON_GREEN, pulse);
        ctx.font = 'bold 14px "Segoe UI", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('MÅL', ob.x, tunnelTop() - 10);
        continue;
      }

      ctx.shadowColor = ob.color;
      ctx.shadowBlur = 10;

      switch (ob.type) {
        case 'gap': {
          ctx.fillStyle = ob.color;
          const topH = ob.gapY - ob.gapSize / 2 - tunnelTop();
          if (topH > 0) ctx.fillRect(ob.x, tunnelTop(), ob.width, topH);
          const botY = ob.gapY + ob.gapSize / 2;
          const botH = tunnelBottom() - botY;
          if (botH > 0) ctx.fillRect(ob.x, botY, ob.width, botH);
          break;
        }
        case 'spikes_top':
          drawSpikesTop(ob.x, ob.width, ob.spikeHeight, ob.color);
          break;
        case 'spikes_bottom':
          drawSpikesBottom(ob.x, ob.width, ob.spikeHeight, ob.color);
          break;
        case 'spikes_both':
          drawSpikesTop(ob.x, ob.width, ob.topHeight, ob.color);
          drawSpikesBottom(ob.x, ob.width, ob.bottomHeight, ob.color);
          break;
        case 'pillars': {
          for (const pil of ob.pillars) {
            const px = ob.x + pil.offsetX;
            ctx.fillStyle = ob.color;
            ctx.fillRect(px, pil.y, pil.width, pil.height);
            drawGlow(px + pil.width / 2, pil.y + pil.height / 2, 25, ob.color, 0.15);
          }
          break;
        }
      }
      ctx.shadowBlur = 0;
    }
  }

  // --- Player ---
  function drawPlayer() {
    if (!player.alive) return;
    if (skinGlowStyle === 'rainbow') loadSkin();

    // Trail — line that follows the arrow path
    if (player.trail.length > 1) {
      for (let i = 1; i < player.trail.length; i++) {
        const pct = i / player.trail.length;
        const alpha = pct * 0.5;
        const width = pct * player.size * 0.7;
        ctx.strokeStyle = hexToRgba(skinTrail, alpha);
        ctx.lineWidth = width;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(player.trail[i - 1].x, player.trail[i - 1].y);
        ctx.lineTo(player.trail[i].x, player.trail[i].y);
        ctx.stroke();
      }
      // Trail glow
      const last6 = player.trail.slice(-6);
      if (last6.length > 1) {
        ctx.shadowColor = skinTrail;
        ctx.shadowBlur = 10;
        ctx.strokeStyle = hexToRgba(skinTrail, 0.15);
        ctx.lineWidth = player.size * 1.2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.beginPath();
        ctx.moveTo(last6[0].x, last6[0].y);
        for (let i = 1; i < last6.length; i++) ctx.lineTo(last6[i].x, last6[i].y);
        ctx.stroke();
        ctx.shadowBlur = 0;
      }
    }

    // Glow around player
    let glowAlpha = 0.3;
    let glowRadius = player.size * 3;
    switch (skinGlowStyle) {
      case 'pulse': glowAlpha = 0.2 + 0.2 * Math.sin(Date.now() * 0.005); break;
      case 'frost': glowRadius = player.size * 5; glowAlpha = 0.15; break;
      case 'flicker': glowAlpha = 0.15 + Math.random() * 0.25; break;
      case 'reverse': glowRadius = player.size * 4; glowAlpha = 0.4; break;
    }
    drawGlow(player.x, player.y, glowRadius, skinGlow, glowAlpha);

    // Player shape — varies by mode
    ctx.save();
    ctx.translate(player.x, player.y);

    const s = player.size;
    const skinId = getEquippedSkinId();
    const cornyImage = cornyImages[skinId];
    const isCorny = cornyImage && cornyImage._loaded;

    if (isCorny) {
      ctx.shadowColor = skinGlow;
      ctx.shadowBlur = 15;
      const imgH = s * 2;
      const imgW = imgH * 3.4;
      ctx.drawImage(cornyImage, -imgW / 2, -imgH / 2, imgW, imgH);
      ctx.shadowBlur = 0;
    } else {
      ctx.shadowColor = skinGlow;
      ctx.shadowBlur = 20;

      switch (gameMode) {
        case MODE.WAVE:
        default: {
          // Chevron arrow
          ctx.fillStyle = skinPrimary;
          ctx.beginPath();
          ctx.moveTo(s * 1.3, 0);
          ctx.lineTo(-s, -s);
          ctx.lineTo(-s * 0.3, 0);
          ctx.lineTo(-s, s);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = hexToRgba(skinGlow, 0.6);
          ctx.lineWidth = 1;
          ctx.stroke();
          ctx.fillStyle = skinSecondary;
          const r = 0.45;
          ctx.beginPath();
          ctx.moveTo(s * 1.3 * r, 0);
          ctx.lineTo(-s * r, -s * r);
          ctx.lineTo(-s * 0.3 * r, 0);
          ctx.lineTo(-s * r, s * r);
          ctx.closePath();
          ctx.fill();
          break;
        }
        case MODE.SHIP: {
          // Triangle rocket
          ctx.fillStyle = skinPrimary;
          ctx.beginPath();
          ctx.moveTo(s * 1.2, 0);
          ctx.lineTo(-s * 0.8, -s * 0.9);
          ctx.lineTo(-s * 0.4, 0);
          ctx.lineTo(-s * 0.8, s * 0.9);
          ctx.closePath();
          ctx.fill();
          ctx.strokeStyle = hexToRgba(skinGlow, 0.5);
          ctx.lineWidth = 1;
          ctx.stroke();
          // Flame when thrusting
          if (holding) {
            ctx.fillStyle = NEON_ORANGE;
            ctx.beginPath();
            ctx.moveTo(-s * 0.4, -s * 0.3);
            ctx.lineTo(-s * 1.2 - Math.random() * s * 0.3, 0);
            ctx.lineTo(-s * 0.4, s * 0.3);
            ctx.closePath();
            ctx.fill();
          }
          // Inner detail
          ctx.fillStyle = skinSecondary;
          ctx.beginPath();
          ctx.arc(0, 0, s * 0.25, 0, Math.PI * 2);
          ctx.fill();
          break;
        }
        case MODE.BALL: {
          // Circle with direction indicator
          ctx.fillStyle = skinPrimary;
          ctx.beginPath();
          ctx.arc(0, 0, s * 0.85, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = hexToRgba(skinGlow, 0.6);
          ctx.lineWidth = 1.5;
          ctx.stroke();
          // Gravity arrow
          ctx.fillStyle = skinSecondary;
          const dir = gravityDir;
          ctx.beginPath();
          ctx.moveTo(0, dir * s * 0.4);
          ctx.lineTo(-s * 0.3, -dir * s * 0.15);
          ctx.lineTo(s * 0.3, -dir * s * 0.15);
          ctx.closePath();
          ctx.fill();
          break;
        }
        case MODE.UFO: {
          // UFO shape: dome + disc
          ctx.fillStyle = skinPrimary;
          // Disc
          ctx.beginPath();
          ctx.ellipse(0, s * 0.1, s * 1.1, s * 0.35, 0, 0, Math.PI * 2);
          ctx.fill();
          // Dome
          ctx.fillStyle = skinSecondary;
          ctx.beginPath();
          ctx.arc(0, -s * 0.1, s * 0.5, Math.PI, 0);
          ctx.fill();
          ctx.strokeStyle = hexToRgba(skinGlow, 0.5);
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.ellipse(0, s * 0.1, s * 1.1, s * 0.35, 0, 0, Math.PI * 2);
          ctx.stroke();
          break;
        }
        case MODE.SWING: {
          // Pendulum bob with line
          ctx.strokeStyle = hexToRgba(skinGlow, 0.3);
          ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.moveTo(0, -s * 1.2);
          ctx.lineTo(0, 0);
          ctx.stroke();
          ctx.fillStyle = skinPrimary;
          ctx.beginPath();
          ctx.arc(0, 0, s * 0.7, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = hexToRgba(skinGlow, 0.6);
          ctx.lineWidth = 1.5;
          ctx.stroke();
          // Center dot
          ctx.fillStyle = skinSecondary;
          ctx.beginPath();
          ctx.arc(0, 0, s * 0.25, 0, Math.PI * 2);
          ctx.fill();
          break;
        }
      }
      ctx.shadowBlur = 0;
    }

    ctx.restore();
  }

  function drawDeathParticles() {
    for (const p of deathParticles) {
      ctx.fillStyle = hexToRgba(p.color, p.life);
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  // --- UI ---
  function drawUI() {
    ctx.textAlign = 'center';
    const modeInfo = MODE_LIST.find(m => m.id === gameMode);
    const modeColor = modeInfo ? modeInfo.color : NEON_BLUE;

    // Mode name (small, top left)
    ctx.fillStyle = hexToRgba(modeColor, 0.6);
    ctx.font = 'bold 13px "Segoe UI", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText(modeInfo ? modeInfo.label.toUpperCase() : '', 15, 28);
    ctx.textAlign = 'center';

    // Score
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 28px "Segoe UI", sans-serif';
    ctx.shadowColor = modeColor;
    ctx.shadowBlur = 10;
    ctx.fillText(score.toString(), W() / 2, 38);
    ctx.shadowBlur = 0;
  }

  // --- Chevron icon for menus ---
  function drawChevronIcon(cx, cy, scale) {
    const skinId = getEquippedSkinId();
    const cornyImage = cornyImages[skinId];
    const isCorny = cornyImage && cornyImage._loaded;
    ctx.save();
    ctx.translate(cx, cy);
    const sc = scale * (1 + 0.08 * Math.sin(menuPulse * 1.5));
    ctx.scale(sc, sc);

    if (isCorny) {
      ctx.shadowColor = skinGlow;
      ctx.shadowBlur = 15;
      const imgH = 20;
      const imgW = imgH * 3.4;
      ctx.drawImage(cornyImage, -imgW / 2, -imgH / 2, imgW, imgH);
      ctx.shadowBlur = 0;
    } else {
      ctx.shadowColor = skinGlow;
      ctx.shadowBlur = 20;
      ctx.fillStyle = skinPrimary;
      ctx.beginPath();
      ctx.moveTo(18, 0); ctx.lineTo(-12, -14); ctx.lineTo(-4, 0); ctx.lineTo(-12, 14);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = skinSecondary;
      ctx.beginPath();
      ctx.moveTo(8, 0); ctx.lineTo(-5, -6); ctx.lineTo(-2, 0); ctx.lineTo(-5, 6);
      ctx.closePath(); ctx.fill();
      ctx.shadowBlur = 0;
    }

    ctx.restore();
  }

  // --- Main Menu ---
  function drawMenu() {
    menuPulse += 0.03;
    loadSkin();
    ctx.textAlign = 'center';

    // Chevron icon
    drawChevronIcon(W() / 2, H() / 2 - 80, 1.8);

    // Title
    ctx.shadowColor = NEON_BLUE;
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 52px "Segoe UI", sans-serif';
    ctx.fillText('NEON DASH', W() / 2, H() / 2 - 20);
    ctx.shadowBlur = 0;

    // Play prompt
    const pulseAlpha = 0.5 + 0.5 * Math.sin(menuPulse * 2);
    ctx.font = 'bold 20px "Segoe UI", sans-serif';
    ctx.fillStyle = hexToRgba('#ffffff', pulseAlpha);
    ctx.fillText('Tryck för att starta', W() / 2, H() / 2 + 35);

    // Best score across all modes
    let bestTotal = 0;
    for (const m of MODE_LIST) {
      const v = parseInt(localStorage.getItem('neondash-hs-' + m.id) || '0');
      if (v > bestTotal) bestTotal = v;
    }
    if (bestTotal > 0) {
      ctx.font = 'bold 16px "Segoe UI", sans-serif';
      ctx.fillStyle = hexToRgba(NEON_PURPLE, 0.9);
      ctx.fillText(`Bästa: ${bestTotal}`, W() / 2, H() / 2 + 70);
    }
  }

  // --- Mode Select ---
  // Helper to draw mode icon shapes
  function drawModeIcon(cx, cy, mode, size, color) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.fillStyle = color;
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;

    switch (mode) {
      case MODE.WAVE: {
        // Zigzag wave line
        ctx.beginPath();
        ctx.moveTo(-size, size * 0.4);
        ctx.lineTo(-size * 0.4, -size * 0.5);
        ctx.lineTo(size * 0.2, size * 0.4);
        ctx.lineTo(size, -size * 0.5);
        ctx.stroke();
        break;
      }
      case MODE.SHIP: {
        // Rocket/triangle pointing right
        ctx.beginPath();
        ctx.moveTo(size, 0);
        ctx.lineTo(-size * 0.7, -size * 0.7);
        ctx.lineTo(-size * 0.3, 0);
        ctx.lineTo(-size * 0.7, size * 0.7);
        ctx.closePath();
        ctx.fill();
        break;
      }
      case MODE.BALL: {
        // Circle
        ctx.beginPath();
        ctx.arc(0, 0, size * 0.6, 0, Math.PI * 2);
        ctx.fill();
        // Arrow inside showing gravity flip
        ctx.fillStyle = '#0a0a1a';
        ctx.beginPath();
        ctx.moveTo(0, -size * 0.25);
        ctx.lineTo(-size * 0.2, size * 0.1);
        ctx.lineTo(size * 0.2, size * 0.1);
        ctx.closePath();
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(0, size * 0.25);
        ctx.lineTo(-size * 0.2, -size * 0.1);
        ctx.lineTo(size * 0.2, -size * 0.1);
        ctx.closePath();
        ctx.fill();
        break;
      }
      case MODE.UFO: {
        // UFO dome + body
        ctx.beginPath();
        ctx.ellipse(0, size * 0.1, size * 0.8, size * 0.25, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(0, -size * 0.05, size * 0.4, Math.PI, 0);
        ctx.fill();
        break;
      }
      case MODE.SWING: {
        // Pendulum arc
        ctx.beginPath();
        ctx.arc(0, -size * 0.8, size * 1.2, Math.PI * 0.3, Math.PI * 0.7);
        ctx.stroke();
        // Bob at bottom
        ctx.beginPath();
        ctx.arc(0, size * 0.3, size * 0.3, 0, Math.PI * 2);
        ctx.fill();
        break;
      }
    }
    ctx.restore();
  }

  function drawModeSelect() {
    menuPulse += 0.03;
    loadSkin();
    ctx.textAlign = 'center';

    // Title
    ctx.shadowColor = NEON_BLUE;
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 36px "Segoe UI", sans-serif';
    ctx.fillText('VÄLJ LÄGE', W() / 2, H() / 2 - 90);
    ctx.shadowBlur = 0;

    // Mode cards — sizes must match click handler!
    const items = MODE_LIST;
    const cardW = 120;
    const cardH = 110;
    const cardGap = 16;
    const totalW = items.length * cardW + (items.length - 1) * cardGap;
    const startX = W() / 2 - totalW / 2;
    const cy = H() / 2 + 10;

    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      const bx = startX + i * (cardW + cardGap);
      const selected = i === selectedModeIndex;
      const cardColor = item.color;
      const hover = 1 + (selected ? 0.06 * Math.sin(menuPulse * 2) : 0);

      // Card background
      ctx.save();
      if (selected) {
        ctx.shadowColor = cardColor;
        ctx.shadowBlur = 20;
        ctx.fillStyle = hexToRgba(cardColor, 0.18);
      } else {
        ctx.fillStyle = 'rgba(255,255,255,0.04)';
      }
      ctx.beginPath();
      ctx.roundRect(bx, cy - cardH / 2, cardW, cardH, 14);
      ctx.fill();

      // Border
      ctx.strokeStyle = selected ? cardColor : 'rgba(255,255,255,0.1)';
      ctx.lineWidth = selected ? 2.5 : 1;
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();

      // Icon
      const iconColor = selected ? cardColor : 'rgba(180,180,200,0.5)';
      drawModeIcon(bx + cardW / 2, cy - 18, item.id, 18 * hover, iconColor);

      // Label
      ctx.fillStyle = selected ? '#ffffff' : 'rgba(255,255,255,0.55)';
      ctx.font = `bold 16px "Segoe UI", sans-serif`;
      ctx.fillText(item.label, bx + cardW / 2, cy + 22);

      // Description
      ctx.fillStyle = selected ? hexToRgba(cardColor, 0.8) : 'rgba(255,255,255,0.25)';
      ctx.font = '11px "Segoe UI", sans-serif';
      ctx.fillText(item.desc, bx + cardW / 2, cy + 38);

      // High score for this mode
      const modeHS = parseInt(localStorage.getItem('neondash-hs-' + item.id) || '0');
      if (modeHS > 0) {
        ctx.fillStyle = selected ? hexToRgba(cardColor, 0.5) : 'rgba(255,255,255,0.15)';
        ctx.font = '10px "Segoe UI", sans-serif';
        ctx.fillText(`★ ${modeHS}`, bx + cardW / 2, cy + 50);
      }
    }

    // Hint
    ctx.font = '13px "Segoe UI", sans-serif';
    ctx.fillStyle = 'rgba(136,136,170,0.6)';
    ctx.fillText('Klicka för att välja', W() / 2, H() / 2 + 85);
  }

  // --- Death Screen ---
  function drawDeathScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W(), H());
    ctx.textAlign = 'center';

    ctx.shadowColor = NEON_PINK;
    ctx.shadowBlur = 20;
    ctx.fillStyle = NEON_PINK;
    ctx.font = 'bold 44px "Segoe UI", sans-serif';
    ctx.fillText('GAME OVER', W() / 2, H() / 2 - 40);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 28px "Segoe UI", sans-serif';
    ctx.fillText(`Poäng: ${score}`, W() / 2, H() / 2 + 10);

    const hs = getHighScore();
    ctx.fillStyle = hexToRgba(NEON_PURPLE, 0.9);
    ctx.font = 'bold 16px "Segoe UI", sans-serif';
    ctx.fillText(`Bästa: ${hs}`, W() / 2, H() / 2 + 40);

    if (score >= hs && score > 0) {
      const p = 0.7 + 0.3 * Math.sin(Date.now() * 0.005);
      ctx.fillStyle = hexToRgba(NEON_GREEN, p);
      ctx.font = 'bold 18px "Segoe UI", sans-serif';
      ctx.fillText('NYTT REKORD!', W() / 2, H() / 2 + 65);
    }

    if (shakeTimer <= 0) {
      const p = 0.5 + 0.5 * Math.sin(Date.now() * 0.004);
      ctx.fillStyle = hexToRgba('#ffffff', p);
      ctx.font = '16px "Segoe UI", sans-serif';
      ctx.fillText('Tryck för att fortsätta', W() / 2, H() / 2 + 100);
    }
  }


  // ========== UPDATE ==========
  function update() {
    if (state === STATE.PLAYING) {
      const tTop = tunnelTop();
      const tBot = tunnelBottom();
      const GRAVITY = 0.35;

      // === Mode-specific movement ===
      switch (gameMode) {
        case MODE.WAVE: {
          // Instant diagonal: hold = up, release = down
          const moveSpeed = gameSpeed;
          player.vy = holding ? -moveSpeed : moveSpeed;
          player.y += player.vy;
          break;
        }
        case MODE.SHIP: {
          // Hold = thrust up (acceleration), release = fall (gravity)
          if (holding) {
            player.vy -= GRAVITY * 1.3;
          } else {
            player.vy += GRAVITY;
          }
          player.vy = Math.max(-gameSpeed * 2.5, Math.min(gameSpeed * 2.5, player.vy));
          player.y += player.vy;
          break;
        }
        case MODE.BALL: {
          // Tap = flip gravity, but ONLY when touching floor or ceiling
          const onFloor = player.y + player.size >= tBot - 1;
          const onCeil = player.y - player.size <= tTop + 1;
          const grounded = onFloor || onCeil;
          if (tapped && grounded) {
            gravityDir *= -1;
            player.vy = 0;
            tapped = false;
          } else {
            tapped = false; // consume tap even if not grounded
          }
          player.vy += GRAVITY * 1.5 * gravityDir;
          player.vy = Math.max(-gameSpeed * 3, Math.min(gameSpeed * 3, player.vy));
          player.y += player.vy;
          // Stick to surfaces
          if (player.y - player.size < tTop) {
            player.y = tTop + player.size;
            player.vy = 0;
          }
          if (player.y + player.size > tBot) {
            player.y = tBot - player.size;
            player.vy = 0;
          }
          break;
        }
        case MODE.UFO: {
          // Tap = fixed upward boost. Gravity always pulls down.
          if (tapped) {
            player.vy = -gameSpeed * 1.8;
            tapped = false;
          }
          player.vy += GRAVITY * 0.9;
          player.vy = Math.max(-gameSpeed * 2.5, Math.min(gameSpeed * 2.5, player.vy));
          player.y += player.vy;
          break;
        }
        case MODE.SWING: {
          // Tap = flip gravity direction. Continuous flight with momentum.
          if (tapped) {
            gravityDir *= -1;
            tapped = false;
          }
          player.vy += GRAVITY * 0.7 * gravityDir;
          player.vy *= 0.97; // damping for smooth arcs
          player.vy = Math.max(-gameSpeed * 2.2, Math.min(gameSpeed * 2.2, player.vy));
          player.y += player.vy;
          break;
        }
      }

      // Clamp to tunnel walls (ball already handled above)
      if (gameMode !== MODE.BALL) {
        if (player.y - player.size < tTop) {
          player.y = tTop + player.size;
          if (gameMode !== MODE.WAVE) player.vy = 0;
        }
        if (player.y + player.size > tBot) {
          player.y = tBot - player.size;
          if (gameMode !== MODE.WAVE) player.vy = 0;
        }
      }

      // Trail
      player.trail.push({ x: player.x, y: player.y });
      if (player.trail.length > 22) player.trail.shift();

      // Move obstacles
      for (const ob of obstacles) ob.x -= gameSpeed;

      // Scoring
      const prevLen = obstacles.length;
      obstacles = obstacles.filter(ob => (ob.x + (ob.width || 100)) > -50);
      score += prevLen - obstacles.length;

      distance += gameSpeed;
      gameSpeed = baseSpeed + distance * 0.00025;

      // Generate new obstacles
      const lastOb = obstacles[obstacles.length - 1];
      if (!lastOb || lastOb.x < W()) {
        const sp = getModeSpacing();
        const spacing = sp.base + Math.random() * sp.rand - Math.min(distance * sp.shrink, sp.maxShrink);
        const newX = lastOb ? lastOb.x + (lastOb.width || 30) + Math.max(spacing, sp.floor) : W() + 100;
        obstacles.push(generateEndlessObstacle(newX));
      }

      // Collision
      if (checkCollision()) die();
    }

    if (shakeTimer > 0) shakeTimer--;
    if (flashTimer > 0) flashTimer--;

    for (const p of deathParticles) {
      p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= p.decay;
    }
    deathParticles = deathParticles.filter(p => p.life > 0);
  }

  // ========== GAME LOOP ==========
  function gameLoop() {
    update();
    ctx.save();

    if (shakeTimer > 0) {
      ctx.translate((Math.random() - 0.5) * shakeTimer * 1.5, (Math.random() - 0.5) * shakeTimer * 1.5);
    }

    drawBackground();

    if (state === STATE.PLAYING) {
      drawObstacles();
      drawPlayer();
      drawUI();
    } else if (state === STATE.DEAD) {
      drawObstacles();
      drawDeathParticles();
      drawUI();
      drawDeathScreen();
    } else if (state === STATE.MODE_SELECT) {
      drawModeSelect();
    } else {
      drawMenu();
    }

    if (flashTimer > 0) {
      ctx.fillStyle = `rgba(255,255,255,${flashTimer / 8 * 0.4})`;
      ctx.fillRect(0, 0, W(), H());
    }

    ctx.restore();
    requestAnimationFrame(gameLoop);
  }

  // --- Start ---
  initStars();
  initBgParticles();
  loadSkin();
  gameLoop();
})();
</script>
</body>
