<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Neon Bird</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      overflow: hidden;
      font-family: 'Segoe UI', 'Nunito', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
    }
    canvas { display: block; width: 100vw; height: 100vh; outline: none; }
  </style>
</head>
<body>
<canvas id="game" tabindex="0"></canvas>
<script>
(() => {
  // === Canvas & Hi-DPI ===
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  canvas.focus();
  window.addEventListener('load', () => canvas.focus());

  function resize() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  const W = () => window.innerWidth;
  const H = () => window.innerHeight;

  // === Colors ===
  const NEON_BLUE = '#00d4ff';
  const NEON_PURPLE = '#a855f7';
  const NEON_PINK = '#ff2d95';
  const NEON_GREEN = '#39ff14';
  const NEON_ORANGE = '#ff6a00';
  const BG_DARK = '#0a0a1a';

  // === Helpers ===
  function hexToRgba(hex, a) {
    if (hex.startsWith('hsl')) return hex.replace(')', `, ${a})`).replace('hsl', 'hsla');
    if (hex.startsWith('rgb')) return hex.replace(')', `, ${a})`).replace('rgb', 'rgba');
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${a})`;
  }

  function lerpColor(hex1, hex2, t) {
    const r1 = parseInt(hex1.slice(1, 3), 16), g1 = parseInt(hex1.slice(3, 5), 16), b1 = parseInt(hex1.slice(5, 7), 16);
    const r2 = parseInt(hex2.slice(1, 3), 16), g2 = parseInt(hex2.slice(3, 5), 16), b2 = parseInt(hex2.slice(5, 7), 16);
    const r = Math.round(r1 + (r2 - r1) * t), g = Math.round(g1 + (g2 - g1) * t), b = Math.round(b1 + (b2 - b1) * t);
    return `rgb(${r},${g},${b})`;
  }

  function drawGlow(x, y, radius, color, alpha) {
    const grad = ctx.createRadialGradient(x, y, 0, x, y, radius);
    grad.addColorStop(0, hexToRgba(color, alpha));
    grad.addColorStop(1, hexToRgba(color, 0));
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fill();
  }

  // === Skin System ===
  const SKIN_DATA = {
    default: { primary: '#00d4ff', secondary: '#ffffff', trail: '#00d4ff', glow: '#00d4ff' },
    crimson: { primary: '#ff2d55', secondary: '#ffaacc', trail: '#ff2d55', glow: '#ff2d55' },
    emerald: { primary: '#39ff14', secondary: '#ccffcc', trail: '#39ff14', glow: '#39ff14' },
    sunset: { primary: '#ff6a00', secondary: '#ffdd44', trail: '#ff8c00', glow: '#ff6a00' },
    phantom: { primary: '#a855f7', secondary: '#e0ccff', trail: '#a855f7', glow: '#a855f7' },
    arctic: { primary: '#88eeff', secondary: '#ffffff', trail: '#aaeeff', glow: '#88eeff' },
    golden: { primary: '#fbbf24', secondary: '#fff8e0', trail: '#fbbf24', glow: '#fbbf24' },
    inferno: { primary: '#ff4400', secondary: '#ff8800', trail: '#ff2200', glow: '#ff4400' },
    void: { primary: '#6600cc', secondary: '#bb88ff', trail: '#3300aa', glow: '#6600cc' },
    rainbow: { primary: 'rainbow', secondary: '#ffffff', trail: 'rainbow', glow: 'rainbow' },
    corny: { primary: '#D4A574', secondary: '#F5E6D0', trail: '#C4956A', glow: '#D4A574' }
  };

  // Corny image
  const cornyImg = new Image();
  let cornyImgLoaded = false;
  const cornyPaths = ['../../images/corny.jpg', '/images/corny.jpg', '../images/corny.jpg', 'images/corny.jpg'];
  let cornyPathIdx = 0;
  cornyImg.onload = () => { cornyImgLoaded = true; };
  cornyImg.onerror = () => { cornyPathIdx++; if (cornyPathIdx < cornyPaths.length) cornyImg.src = cornyPaths[cornyPathIdx]; };
  cornyImg.src = cornyPaths[0];

  let skinPrimary = NEON_BLUE;
  let skinSecondary = '#ffffff';
  let skinTrail = NEON_BLUE;
  let skinGlow = NEON_BLUE;
  let _equippedSkinId = 'default';

  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'skin-data') {
      _equippedSkinId = e.data.skinId || 'default';
      loadSkin();
    }
  });

  function loadSkin() {
    const skin = SKIN_DATA[_equippedSkinId] || SKIN_DATA.default;
    if (skin.primary === 'rainbow') {
      const hue = (Date.now() / 15) % 360;
      skinPrimary = `hsl(${hue}, 100%, 55%)`;
      skinSecondary = '#ffffff';
      skinTrail = `hsl(${(hue + 60) % 360}, 100%, 55%)`;
      skinGlow = `hsl(${hue}, 100%, 55%)`;
    } else {
      skinPrimary = skin.primary;
      skinSecondary = skin.secondary;
      skinTrail = skin.trail;
      skinGlow = skin.glow;
    }
  }

  // === Game State ===
  const STATE = { MENU: 0, PLAYING: 1, DEAD: 2 };
  let state = STATE.MENU;

  // === Constants ===
  const GRAVITY = 0.45;
  const FLAP_FORCE = -7.5;
  const MAX_FALL_SPEED = 10;
  const BIRD_RADIUS = 16;

  const PIPE_WIDTH = 60;
  const PIPE_GAP = 150;
  const PIPE_SPEED = 2.5;
  const PIPE_SPAWN_INTERVAL = 220;
  const PIPE_GAP_SHRINK = 0.8;
  const MIN_PIPE_GAP = 110;

  const COIN_CHANCE = 0.3;
  const COIN_RADIUS = 10;
  const GROUND_HEIGHT = 50;

  // === Game Variables ===
  let score = 0;
  let highScore = parseInt(localStorage.getItem('neonbird-highscore') || '0');
  let newRecord = false;
  let pipes = [];
  let coins = [];
  let distance = 0;

  const bird = {
    x: 0, y: 0, vy: 0, rotation: 0, flapAnim: 0, alive: true, trail: []
  };

  let shakeTimer = 0;
  let flashTimer = 0;
  let deathParticles = [];
  let menuPulse = 0;

  // Background layers
  let bgStars = [];
  let bgBubbles = [];
  let bgLeaves = [];

  // Zone system
  let currentZone = 0;
  let prevZone = 0;
  let nextZone = 0;
  let zoneBlend = 1;

  const ZONES = [
    {
      name: 'Rymden',
      bgTop: '#0a0a1a', bgBot: '#0a0a2e',
      starDensity: 1.0, bubbleDensity: 0.1, leafDensity: 0.05,
      pipeColor: NEON_BLUE, pipeAccent: NEON_PURPLE,
      groundColor: '#1a1a3a'
    },
    {
      name: 'Havet',
      bgTop: '#0a1a2a', bgBot: '#0a2a3a',
      starDensity: 0.2, bubbleDensity: 1.0, leafDensity: 0.15,
      pipeColor: NEON_GREEN, pipeAccent: NEON_BLUE,
      groundColor: '#0a2a2a'
    },
    {
      name: 'Skogen',
      bgTop: '#0a1a0a', bgBot: '#1a2a1a',
      starDensity: 0.15, bubbleDensity: 0.1, leafDensity: 1.0,
      pipeColor: NEON_GREEN, pipeAccent: NEON_ORANGE,
      groundColor: '#1a2a1a'
    }
  ];

  function getZoneValue(key) {
    const a = ZONES[prevZone][key];
    const b = ZONES[nextZone][key];
    if (typeof a === 'number') return a + (b - a) * zoneBlend;
    if (typeof a === 'string' && a.startsWith('#')) return lerpColor(a, b, zoneBlend);
    return zoneBlend < 0.5 ? a : b;
  }

  function updateZone() {
    const newZone = Math.floor(score / 15) % 3;
    if (newZone !== currentZone) {
      prevZone = currentZone;
      nextZone = newZone;
      currentZone = newZone;
      zoneBlend = 0;
    }
    if (zoneBlend < 1) {
      zoneBlend = Math.min(1, zoneBlend + 0.01);
    }
  }

  // === Screen delay ===
  let lastScreenChange = 0;
  const SCREEN_DELAY = 400;
  function screenReady() { return Date.now() - lastScreenChange > SCREEN_DELAY; }

  // === Init ===
  function initBird() {
    bird.x = W() * 0.22;
    bird.y = H() / 2;
    bird.vy = 0;
    bird.rotation = 0;
    bird.flapAnim = 0;
    bird.alive = true;
    bird.trail = [];
  }

  function initBackground() {
    bgStars = [];
    for (let i = 0; i < 100; i++) {
      bgStars.push({
        x: Math.random() * 2000,
        y: Math.random() * 1200,
        size: Math.random() * 2 + 0.5,
        speed: Math.random() * 0.3 + 0.1,
        twinkleOffset: Math.random() * Math.PI * 2
      });
    }
    bgBubbles = [];
    for (let i = 0; i < 40; i++) {
      bgBubbles.push({
        x: Math.random() * 2000,
        y: Math.random() * 1200,
        size: Math.random() * 6 + 2,
        speed: Math.random() * 0.5 + 0.2,
        wobbleOffset: Math.random() * Math.PI * 2
      });
    }
    bgLeaves = [];
    for (let i = 0; i < 30; i++) {
      bgLeaves.push({
        x: Math.random() * 2000,
        y: Math.random() * 1200,
        size: Math.random() * 8 + 4,
        speed: Math.random() * 1 + 0.5,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.03
      });
    }
  }

  // === Pipe generation ===
  function spawnPipe() {
    const gapSize = Math.max(MIN_PIPE_GAP, PIPE_GAP - score * PIPE_GAP_SHRINK);
    const minY = gapSize / 2 + 40;
    const maxY = H() - GROUND_HEIGHT - gapSize / 2 - 40;
    const gapY = minY + Math.random() * (maxY - minY);

    const pipe = {
      x: W() + PIPE_WIDTH,
      gapY: gapY,
      gapSize: gapSize,
      scored: false,
      color: getZoneValue('pipeColor'),
      accent: getZoneValue('pipeAccent')
    };

    if (Math.random() < COIN_CHANCE) {
      coins.push({
        x: pipe.x + PIPE_WIDTH / 2,
        y: gapY + (Math.random() - 0.5) * gapSize * 0.4,
        collected: false,
        glowPhase: Math.random() * Math.PI * 2
      });
    }

    pipes.push(pipe);
  }

  // === Collision ===
  function checkCollision() {
    const bx = bird.x, by = bird.y, br = BIRD_RADIUS * 0.7;

    if (by + br > H() - GROUND_HEIGHT) return true;
    if (by - br < 0) return true;

    for (const pipe of pipes) {
      const pipeLeft = pipe.x;
      const pipeRight = pipe.x + PIPE_WIDTH;
      if (bx + br > pipeLeft && bx - br < pipeRight) {
        const gapTop = pipe.gapY - pipe.gapSize / 2;
        const gapBottom = pipe.gapY + pipe.gapSize / 2;
        if (by - br < gapTop || by + br > gapBottom) return true;
      }
    }
    return false;
  }

  // === Scoring ===
  function updateScoring() {
    for (const pipe of pipes) {
      if (!pipe.scored && pipe.x + PIPE_WIDTH < bird.x) {
        pipe.scored = true;
        score++;
      }
    }
    for (const coin of coins) {
      if (coin.collected) continue;
      const dx = bird.x - coin.x;
      const dy = bird.y - coin.y;
      if (Math.sqrt(dx * dx + dy * dy) < BIRD_RADIUS + COIN_RADIUS) {
        coin.collected = true;
        score += 3;
        flashTimer = 3;
      }
    }
  }

  // === Flap ===
  function flap() {
    if (state === STATE.PLAYING && bird.alive) {
      bird.vy = FLAP_FORCE;
      bird.flapAnim = 1;
    }
  }

  // === Start / Die ===
  function startGame() {
    score = 0;
    distance = 0;
    pipes = [];
    coins = [];
    deathParticles = [];
    shakeTimer = 0;
    flashTimer = 0;
    newRecord = false;
    currentZone = 0;
    prevZone = 0;
    nextZone = 0;
    zoneBlend = 1;
    initBird();
    loadSkin();
    state = STATE.PLAYING;
    lastScreenChange = Date.now();
  }

  function die() {
    bird.alive = false;
    state = STATE.DEAD;
    shakeTimer = 20;
    flashTimer = 8;
    lastScreenChange = Date.now();

    if (score > highScore) {
      highScore = score;
      newRecord = true;
      localStorage.setItem('neonbird-highscore', highScore.toString());
    }

    if (score > 0 && window.parent !== window) {
      window.parent.postMessage({ type: 'game-score', score: score }, '*');
    }

    for (let i = 0; i < 40; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 7 + 2;
      deathParticles.push({
        x: bird.x, y: bird.y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        size: Math.random() * 4 + 2,
        life: 1,
        decay: Math.random() * 0.03 + 0.01,
        color: skinPrimary
      });
    }
  }

  // === Input ===
  canvas.addEventListener('mousedown', (e) => {
    e.preventDefault();
    canvas.focus();
    if (state === STATE.PLAYING) {
      flap();
    } else if (state === STATE.MENU && screenReady()) {
      startGame();
    } else if (state === STATE.DEAD && shakeTimer <= 0 && screenReady()) {
      state = STATE.MENU;
      lastScreenChange = Date.now();
    }
  });

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    canvas.focus();
    if (state === STATE.PLAYING) {
      flap();
    } else if (state === STATE.MENU && screenReady()) {
      startGame();
    } else if (state === STATE.DEAD && shakeTimer <= 0 && screenReady()) {
      state = STATE.MENU;
      lastScreenChange = Date.now();
    }
  }, { passive: false });

  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      e.preventDefault();
      if (e.repeat) return;
      if (state === STATE.PLAYING) {
        flap();
      } else if (state === STATE.MENU && screenReady()) {
        startGame();
      } else if (state === STATE.DEAD && shakeTimer <= 0 && screenReady()) {
        state = STATE.MENU;
        lastScreenChange = Date.now();
      }
    }
  });

  // === Drawing ===
  function drawBackground() {
    const bgTop = getZoneValue('bgTop');
    const bgBot = getZoneValue('bgBot');
    const grad = ctx.createLinearGradient(0, 0, 0, H());
    grad.addColorStop(0, bgTop);
    grad.addColorStop(1, bgBot);
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W(), H());

    const starAlpha = getZoneValue('starDensity');
    const bubbleAlpha = getZoneValue('bubbleDensity');
    const leafAlpha = getZoneValue('leafDensity');
    const t = Date.now() * 0.001;

    // Stars
    for (const s of bgStars) {
      const sx = ((s.x - distance * s.speed) % W() + W()) % W();
      const sy = s.y % H();
      const twinkle = 0.4 + 0.6 * Math.sin(t * 2 + s.twinkleOffset);
      ctx.fillStyle = hexToRgba('#ffffff', starAlpha * twinkle * 0.7);
      ctx.beginPath();
      ctx.arc(sx, sy, s.size, 0, Math.PI * 2);
      ctx.fill();
    }

    // Bubbles
    for (const b of bgBubbles) {
      const bx = ((b.x - distance * b.speed) % W() + W()) % W();
      const wobble = Math.sin(t * 1.5 + b.wobbleOffset) * 8;
      const by = ((b.y + wobble) % H() + H()) % H();
      ctx.strokeStyle = hexToRgba(NEON_BLUE, bubbleAlpha * 0.35);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(bx, by, b.size, 0, Math.PI * 2);
      ctx.stroke();
      // Highlight
      ctx.fillStyle = hexToRgba(NEON_BLUE, bubbleAlpha * 0.1);
      ctx.beginPath();
      ctx.arc(bx - b.size * 0.3, by - b.size * 0.3, b.size * 0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    // Leaves
    for (const l of bgLeaves) {
      const lx = ((l.x - distance * l.speed) % W() + W()) % W();
      const ly = l.y % H();
      l.rotation += l.rotSpeed;
      ctx.save();
      ctx.translate(lx, ly);
      ctx.rotate(l.rotation);
      ctx.fillStyle = hexToRgba(NEON_GREEN, leafAlpha * 0.3);
      ctx.beginPath();
      ctx.ellipse(0, 0, l.size, l.size * 0.4, 0, 0, Math.PI * 2);
      ctx.fill();
      // Leaf vein
      ctx.strokeStyle = hexToRgba(NEON_GREEN, leafAlpha * 0.2);
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(-l.size, 0);
      ctx.lineTo(l.size, 0);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawGround() {
    const groundY = H() - GROUND_HEIGHT;
    const gc = getZoneValue('groundColor');

    ctx.fillStyle = gc;
    ctx.fillRect(0, groundY, W(), GROUND_HEIGHT);

    const pc = getZoneValue('pipeColor');
    ctx.shadowColor = pc;
    ctx.shadowBlur = 8;
    ctx.strokeStyle = hexToRgba(pc, 0.6);
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, groundY);
    ctx.lineTo(W(), groundY);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Scrolling grid
    const scrollOffset = (distance * 0.8) % 40;
    ctx.strokeStyle = hexToRgba(pc, 0.08);
    ctx.lineWidth = 0.5;
    for (let x = -scrollOffset; x < W(); x += 40) {
      ctx.beginPath();
      ctx.moveTo(x, groundY);
      ctx.lineTo(x, H());
      ctx.stroke();
    }
  }

  function drawPipe(pipe) {
    const gapTop = pipe.gapY - pipe.gapSize / 2;
    const gapBot = pipe.gapY + pipe.gapSize / 2;
    const lipW = 8;
    const lipH = 12;

    ctx.shadowColor = pipe.color;
    ctx.shadowBlur = 12;

    // Top pipe
    ctx.fillStyle = hexToRgba(pipe.color, 0.12);
    ctx.strokeStyle = pipe.color;
    ctx.lineWidth = 2;
    ctx.fillRect(pipe.x, 0, PIPE_WIDTH, gapTop);
    ctx.strokeRect(pipe.x + 1, 0, PIPE_WIDTH - 2, gapTop);

    // Top lip
    ctx.fillStyle = hexToRgba(pipe.color, 0.25);
    ctx.fillRect(pipe.x - lipW, gapTop - lipH, PIPE_WIDTH + lipW * 2, lipH);
    ctx.strokeRect(pipe.x - lipW, gapTop - lipH, PIPE_WIDTH + lipW * 2, lipH);

    // Bottom pipe
    ctx.fillStyle = hexToRgba(pipe.color, 0.12);
    ctx.fillRect(pipe.x, gapBot, PIPE_WIDTH, H() - GROUND_HEIGHT - gapBot);
    ctx.strokeRect(pipe.x + 1, gapBot, PIPE_WIDTH - 2, H() - GROUND_HEIGHT - gapBot);

    // Bottom lip
    ctx.fillStyle = hexToRgba(pipe.color, 0.25);
    ctx.fillRect(pipe.x - lipW, gapBot, PIPE_WIDTH + lipW * 2, lipH);
    ctx.strokeRect(pipe.x - lipW, gapBot, PIPE_WIDTH + lipW * 2, lipH);

    ctx.shadowBlur = 0;

    // Center glow line
    ctx.strokeStyle = hexToRgba(pipe.accent, 0.15);
    ctx.lineWidth = 1;
    const cx = pipe.x + PIPE_WIDTH / 2;
    ctx.beginPath(); ctx.moveTo(cx, 0); ctx.lineTo(cx, gapTop - lipH); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx, gapBot + lipH); ctx.lineTo(cx, H() - GROUND_HEIGHT); ctx.stroke();
  }

  function drawCoins() {
    for (const coin of coins) {
      if (coin.collected) continue;
      coin.glowPhase += 0.03;
      const pulse = 0.6 + 0.4 * Math.sin(coin.glowPhase);

      drawGlow(coin.x, coin.y, COIN_RADIUS * 2.5, NEON_ORANGE, 0.15 * pulse);

      ctx.shadowColor = NEON_ORANGE;
      ctx.shadowBlur = 10;
      ctx.fillStyle = hexToRgba(NEON_ORANGE, pulse);
      ctx.beginPath();
      ctx.arc(coin.x, coin.y, COIN_RADIUS, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = hexToRgba('#ffffff', 0.5);
      ctx.beginPath();
      ctx.arc(coin.x, coin.y, COIN_RADIUS * 0.45, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
  }

  function drawBird() {
    if (!bird.alive) return;
    if (_equippedSkinId === 'rainbow') loadSkin();

    // Trail
    if (bird.trail.length > 1) {
      for (let i = 1; i < bird.trail.length; i++) {
        const pct = i / bird.trail.length;
        ctx.strokeStyle = hexToRgba(skinTrail, pct * 0.35);
        ctx.lineWidth = pct * BIRD_RADIUS * 0.5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(bird.trail[i - 1].x, bird.trail[i - 1].y);
        ctx.lineTo(bird.trail[i].x, bird.trail[i].y);
        ctx.stroke();
      }
    }

    drawGlow(bird.x, bird.y, BIRD_RADIUS * 3, skinGlow, 0.2);

    ctx.save();
    ctx.translate(bird.x, bird.y);

    const r = BIRD_RADIUS;
    const isCorny = _equippedSkinId === 'corny' && cornyImgLoaded;

    if (isCorny) {
      bird.rotation = Math.max(-10, Math.min(15, bird.vy * 1.5));
    } else {
      bird.rotation = Math.max(-30, Math.min(70, bird.vy * 4));
    }
    ctx.rotate(bird.rotation * Math.PI / 180);

    if (isCorny) {
      // Draw Corny image as the bird
      const imgH = r * 2;
      const imgW = imgH * 3.4;
      ctx.shadowColor = '#D4A574';
      ctx.shadowBlur = 15;
      ctx.drawImage(cornyImg, -imgW / 2, -imgH / 2, imgW, imgH);
      ctx.shadowBlur = 0;
    } else {
      // Body
      ctx.shadowColor = skinGlow;
      ctx.shadowBlur = 15;
      ctx.fillStyle = skinPrimary;
      ctx.beginPath();
      ctx.arc(0, 0, r, 0, Math.PI * 2);
      ctx.fill();

      ctx.strokeStyle = hexToRgba(skinGlow, 0.5);
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Wing
      bird.flapAnim *= 0.85;
      const wingAngle = Math.sin(bird.flapAnim * Math.PI * 3) * 25;
      ctx.save();
      ctx.translate(-r * 0.3, -r * 0.2);
      ctx.rotate((wingAngle - 15) * Math.PI / 180);
      ctx.fillStyle = skinSecondary;
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 0.9, r * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();

      // Eye
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(r * 0.35, -r * 0.2, r * 0.25, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#111111';
      ctx.beginPath();
      ctx.arc(r * 0.45, -r * 0.2, r * 0.12, 0, Math.PI * 2);
      ctx.fill();

      // Beak
      ctx.fillStyle = NEON_ORANGE;
      ctx.beginPath();
      ctx.moveTo(r * 0.75, -r * 0.15);
      ctx.lineTo(r * 1.3, 0);
      ctx.lineTo(r * 0.75, r * 0.15);
      ctx.closePath();
      ctx.fill();
    }

    ctx.restore();
  }

  function drawMenuBird(x, y) {
    ctx.save();
    ctx.translate(x, y);

    const r = BIRD_RADIUS * 1.5;
    const t = Date.now() * 0.003;
    const wingFlap = Math.sin(t * 3) * 20;

    // Glow
    drawGlow(0, 0, r * 3, skinGlow, 0.25);

    const isCorny = _equippedSkinId === 'corny' && cornyImgLoaded;

    if (isCorny) {
      const imgH = r * 2;
      const imgW = imgH * 3.4;
      ctx.shadowColor = '#D4A574';
      ctx.shadowBlur = 20;
      ctx.drawImage(cornyImg, -imgW / 2, -imgH / 2, imgW, imgH);
      ctx.shadowBlur = 0;
    } else {
    // Body
    ctx.shadowColor = skinGlow;
    ctx.shadowBlur = 20;
    ctx.fillStyle = skinPrimary;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = hexToRgba(skinGlow, 0.5);
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Wing
    ctx.save();
    ctx.translate(-r * 0.3, -r * 0.2);
    ctx.rotate((wingFlap - 15) * Math.PI / 180);
    ctx.fillStyle = skinSecondary;
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.ellipse(0, 0, r * 0.9, r * 0.35, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();

    // Eye
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(r * 0.35, -r * 0.2, r * 0.25, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#111111';
    ctx.beginPath();
    ctx.arc(r * 0.45, -r * 0.2, r * 0.12, 0, Math.PI * 2);
    ctx.fill();

    // Beak
    ctx.fillStyle = NEON_ORANGE;
    ctx.beginPath();
    ctx.moveTo(r * 0.75, -r * 0.15);
    ctx.lineTo(r * 1.3, 0);
    ctx.lineTo(r * 0.75, r * 0.15);
    ctx.closePath();
    ctx.fill();
    }

    ctx.restore();
  }

  function drawDeathParticles() {
    for (const p of deathParticles) {
      ctx.fillStyle = hexToRgba(p.color, p.life * 0.8);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawUI() {
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 48px "Segoe UI", sans-serif';
    ctx.shadowColor = NEON_BLUE;
    ctx.shadowBlur = 10;
    ctx.fillText(score.toString(), W() / 2, 60);
    ctx.shadowBlur = 0;

    // Zone name
    const zone = ZONES[currentZone];
    ctx.textAlign = 'right';
    ctx.font = '12px "Segoe UI", sans-serif';
    ctx.fillStyle = hexToRgba(zone.pipeColor, 0.5);
    ctx.fillText(zone.name, W() - 15, 25);
    ctx.textAlign = 'center';
  }

  function drawMenu() {
    menuPulse += 0.03;
    loadSkin();

    const bobY = H() * 0.35 + Math.sin(menuPulse * 1.5) * 8;
    drawMenuBird(W() / 2, bobY);

    ctx.textAlign = 'center';

    // Title
    ctx.shadowColor = NEON_BLUE;
    ctx.shadowBlur = 30;
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 52px "Segoe UI", sans-serif';
    ctx.fillText('NEON BIRD', W() / 2, H() * 0.35 + 65);
    ctx.shadowBlur = 0;

    // Subtitle
    ctx.font = '14px "Segoe UI", sans-serif';
    ctx.fillStyle = hexToRgba(NEON_PURPLE, 0.6);
    ctx.fillText('Rymden  \u00b7  Havet  \u00b7  Skogen', W() / 2, H() * 0.35 + 88);

    // Play prompt
    const pulseAlpha = 0.5 + 0.5 * Math.sin(menuPulse * 2);
    ctx.font = 'bold 20px "Segoe UI", sans-serif';
    ctx.fillStyle = hexToRgba('#ffffff', pulseAlpha);
    ctx.fillText('Tryck f\u00f6r att starta', W() / 2, H() * 0.35 + 130);

    // High score
    if (highScore > 0) {
      ctx.font = 'bold 16px "Segoe UI", sans-serif';
      ctx.fillStyle = hexToRgba(NEON_PURPLE, 0.9);
      ctx.fillText(`B\u00e4sta: ${highScore}`, W() / 2, H() * 0.35 + 165);
    }
  }

  function drawDeathScreen() {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W(), H());

    ctx.textAlign = 'center';

    ctx.shadowColor = NEON_PINK;
    ctx.shadowBlur = 20;
    ctx.fillStyle = NEON_PINK;
    ctx.font = 'bold 44px "Segoe UI", sans-serif';
    ctx.fillText('GAME OVER', W() / 2, H() / 2 - 40);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 28px "Segoe UI", sans-serif';
    ctx.fillText(`Po\u00e4ng: ${score}`, W() / 2, H() / 2 + 10);

    ctx.fillStyle = hexToRgba(NEON_PURPLE, 0.9);
    ctx.font = 'bold 16px "Segoe UI", sans-serif';
    ctx.fillText(`B\u00e4sta: ${highScore}`, W() / 2, H() / 2 + 40);

    if (newRecord && score > 0) {
      const p = 0.7 + 0.3 * Math.sin(Date.now() * 0.005);
      ctx.fillStyle = hexToRgba(NEON_GREEN, p);
      ctx.font = 'bold 18px "Segoe UI", sans-serif';
      ctx.fillText('NYTT REKORD!', W() / 2, H() / 2 + 68);
    }

    if (shakeTimer <= 0) {
      const p = 0.5 + 0.5 * Math.sin(Date.now() * 0.004);
      ctx.fillStyle = hexToRgba('#ffffff', p);
      ctx.font = '16px "Segoe UI", sans-serif';
      ctx.fillText('Tryck f\u00f6r att forts\u00e4tta', W() / 2, H() / 2 + 105);
    }
  }

  // === Update ===
  function update() {
    if (state === STATE.PLAYING) {
      bird.vy += GRAVITY;
      bird.vy = Math.min(bird.vy, MAX_FALL_SPEED);
      bird.y += bird.vy;

      bird.trail.push({ x: bird.x, y: bird.y });
      if (bird.trail.length > 15) bird.trail.shift();

      for (const pipe of pipes) pipe.x -= PIPE_SPEED;
      for (const coin of coins) coin.x -= PIPE_SPEED;

      pipes = pipes.filter(p => p.x + PIPE_WIDTH > -20);
      coins = coins.filter(c => c.x > -20 && !c.collected);

      const lastPipe = pipes[pipes.length - 1];
      if (!lastPipe || lastPipe.x < W() - PIPE_SPAWN_INTERVAL) {
        spawnPipe();
      }

      distance += PIPE_SPEED;
      updateZone();
      updateScoring();

      if (checkCollision()) die();
    }

    if (shakeTimer > 0) shakeTimer--;
    if (flashTimer > 0) flashTimer--;

    for (const p of deathParticles) {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.15;
      p.life -= p.decay;
    }
    deathParticles = deathParticles.filter(p => p.life > 0);
  }

  // === Game Loop ===
  function gameLoop() {
    update();
    ctx.save();

    if (shakeTimer > 0) {
      ctx.translate(
        (Math.random() - 0.5) * shakeTimer * 1.5,
        (Math.random() - 0.5) * shakeTimer * 1.5
      );
    }

    drawBackground();
    drawGround();

    if (state === STATE.PLAYING) {
      for (const pipe of pipes) drawPipe(pipe);
      drawCoins();
      drawBird();
      drawUI();
    } else if (state === STATE.DEAD) {
      for (const pipe of pipes) drawPipe(pipe);
      drawCoins();
      drawDeathParticles();
      drawDeathScreen();
    } else {
      drawMenu();
    }

    if (flashTimer > 0) {
      ctx.fillStyle = `rgba(255,255,255,${flashTimer / 8 * 0.4})`;
      ctx.fillRect(0, 0, W(), H());
    }

    ctx.restore();
    requestAnimationFrame(gameLoop);
  }

  // === Bootstrap ===
  initBackground();
  loadSkin();
  gameLoop();
})();
</script>
</body>
</html>
