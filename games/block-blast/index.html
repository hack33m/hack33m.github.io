<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Block Blast</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      overflow: hidden;
      font-family: 'Segoe UI', 'Nunito', sans-serif;
      user-select: none;
      -webkit-user-select: none;
      touch-action: none;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
    }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="game"></canvas>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');

  // ========== HI-DPI ==========
  let dpr = 1;
  function resize() {
    dpr = window.devicePixelRatio || 1;
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);
  const W = () => window.innerWidth;
  const H = () => window.innerHeight;

  // ========== CONSTANTS ==========
  const COLS = 8;
  const ROWS = 8;
  const NEON_BLUE = '#00d4ff';
  const NEON_PURPLE = '#a855f7';
  const NEON_PINK = '#ff2d95';
  const NEON_GREEN = '#39ff14';
  const NEON_ORANGE = '#ff6a00';
  const NEON_YELLOW = '#ffe600';
  const NEON_RED = '#ff3344';
  const NEON_CYAN = '#00fff7';

  const BLOCK_COLORS = [NEON_BLUE, NEON_PURPLE, NEON_PINK, NEON_GREEN, NEON_ORANGE, NEON_YELLOW, NEON_RED, NEON_CYAN];

  // ========== PIECE SHAPES ==========
  // Each shape is array of [row, col] offsets
  const SHAPES = [
    // Single
    { cells: [[0,0]], color: 0 },
    // 2-line horizontal
    { cells: [[0,0],[0,1]], color: 1 },
    // 3-line horizontal
    { cells: [[0,0],[0,1],[0,2]], color: 2 },
    // 4-line horizontal
    { cells: [[0,0],[0,1],[0,2],[0,3]], color: 3 },
    // 5-line horizontal
    { cells: [[0,0],[0,1],[0,2],[0,3],[0,4]], color: 4 },
    // 2-line vertical
    { cells: [[0,0],[1,0]], color: 1 },
    // 3-line vertical
    { cells: [[0,0],[1,0],[2,0]], color: 2 },
    // 4-line vertical
    { cells: [[0,0],[1,0],[2,0],[3,0]], color: 3 },
    // 5-line vertical
    { cells: [[0,0],[1,0],[2,0],[3,0],[4,0]], color: 4 },
    // 2x2 square
    { cells: [[0,0],[0,1],[1,0],[1,1]], color: 5 },
    // 3x3 square
    { cells: [[0,0],[0,1],[0,2],[1,0],[1,1],[1,2],[2,0],[2,1],[2,2]], color: 6 },
    // L-shape
    { cells: [[0,0],[1,0],[2,0],[2,1]], color: 7 },
    // L-shape mirrored
    { cells: [[0,0],[0,1],[1,0],[2,0]], color: 0 },
    // L-shape rotated
    { cells: [[0,0],[0,1],[0,2],[1,2]], color: 1 },
    // L-shape rotated mirrored
    { cells: [[0,0],[0,1],[0,2],[1,0]], color: 2 },
    // T-shape
    { cells: [[0,0],[0,1],[0,2],[1,1]], color: 3 },
    // S-shape
    { cells: [[0,1],[0,2],[1,0],[1,1]], color: 4 },
    // Z-shape
    { cells: [[0,0],[0,1],[1,1],[1,2]], color: 5 },
    // Corner 2x2
    { cells: [[0,0],[0,1],[1,0]], color: 6 },
    // Corner 2x2 mirrored
    { cells: [[0,0],[0,1],[1,1]], color: 7 },
  ];

  // ========== GAME STATE ==========
  const STATE = { PLAYING: 0, GAME_OVER: 1 };
  let state = STATE.PLAYING;
  let grid = []; // ROWS x COLS, 0 = empty, string = color
  let score = 0;
  let highScore = parseInt(localStorage.getItem('blockblast-hs') || '0');
  let combo = 0;
  let pieces = []; // 3 pieces to choose from
  let dragging = null; // { pieceIndex, offsetX, offsetY, x, y }
  let clearAnimations = []; // { cells: [{r,c}], timer, color }
  let scorePopups = []; // { x, y, text, timer, color }
  let shakeTimer = 0;

  // ========== LAYOUT ==========
  function getCellSize() {
    const maxGridW = W() * 0.85;
    const maxGridH = H() * 0.58;
    return Math.floor(Math.min(maxGridW / COLS, maxGridH / ROWS));
  }

  function getGridOrigin() {
    const cell = getCellSize();
    const gw = cell * COLS;
    return { x: (W() - gw) / 2, y: H() * 0.05 };
  }

  function getPieceAreaY() {
    const cell = getCellSize();
    const origin = getGridOrigin();
    return origin.y + cell * ROWS + 20;
  }

  // ========== INIT ==========
  function initGrid() {
    grid = [];
    for (let r = 0; r < ROWS; r++) {
      grid.push(new Array(COLS).fill(0));
    }
  }

  function randomPiece() {
    const shape = SHAPES[Math.floor(Math.random() * SHAPES.length)];
    const color = BLOCK_COLORS[Math.floor(Math.random() * BLOCK_COLORS.length)];
    return { cells: shape.cells.map(c => [...c]), color };
  }

  function spawnPieces() {
    pieces = [randomPiece(), randomPiece(), randomPiece()];
  }

  function init() {
    initGrid();
    score = 0;
    combo = 0;
    clearAnimations = [];
    scorePopups = [];
    shakeTimer = 0;
    state = STATE.PLAYING;
    spawnPieces();
  }

  // ========== GAME LOGIC ==========
  function canPlace(piece, gridRow, gridCol) {
    for (const [r, c] of piece.cells) {
      const gr = gridRow + r;
      const gc = gridCol + c;
      if (gr < 0 || gr >= ROWS || gc < 0 || gc >= COLS) return false;
      if (grid[gr][gc] !== 0) return false;
    }
    return true;
  }

  function placePiece(piece, gridRow, gridCol) {
    for (const [r, c] of piece.cells) {
      grid[gridRow + r][gridCol + c] = piece.color;
    }
  }

  function checkAndClearLines() {
    const rowsToClear = [];
    const colsToClear = [];

    for (let r = 0; r < ROWS; r++) {
      if (grid[r].every(c => c !== 0)) rowsToClear.push(r);
    }
    for (let c = 0; c < COLS; c++) {
      let full = true;
      for (let r = 0; r < ROWS; r++) {
        if (grid[r][c] === 0) { full = false; break; }
      }
      if (full) colsToClear.push(c);
    }

    if (rowsToClear.length === 0 && colsToClear.length === 0) {
      combo = 0;
      return 0;
    }

    // Collect cells to clear
    const cellsToClear = new Set();
    const animCells = [];
    for (const r of rowsToClear) {
      for (let c = 0; c < COLS; c++) {
        const key = r + ',' + c;
        if (!cellsToClear.has(key)) {
          cellsToClear.add(key);
          animCells.push({ r, c, color: grid[r][c] });
        }
      }
    }
    for (const c of colsToClear) {
      for (let r = 0; r < ROWS; r++) {
        const key = r + ',' + c;
        if (!cellsToClear.has(key)) {
          cellsToClear.add(key);
          animCells.push({ r, c, color: grid[r][c] });
        }
      }
    }

    // Add clear animation
    clearAnimations.push({ cells: animCells, timer: 20 });

    // Clear cells
    for (const { r, c } of animCells) {
      grid[r][c] = 0;
    }

    const linesCleared = rowsToClear.length + colsToClear.length;
    combo++;

    // Score: lines * 10 * combo multiplier
    const points = linesCleared * 10 * combo;

    // Score popup
    const origin = getGridOrigin();
    const cell = getCellSize();
    const popX = origin.x + cell * COLS / 2;
    const popY = origin.y + cell * ROWS / 2;
    let text = '+' + points;
    if (combo > 1) text += ' x' + combo;
    scorePopups.push({ x: popX, y: popY, text, timer: 60, color: combo > 1 ? NEON_YELLOW : NEON_GREEN });

    score += points;
    if (score > highScore) {
      highScore = score;
      localStorage.setItem('blockblast-hs', highScore.toString());
    }

    // Send score to parent
    if (window.parent !== window) {
      window.parent.postMessage({ type: 'game-score', score }, '*');
    }

    return linesCleared;
  }

  function canPlaceAny() {
    for (const piece of pieces) {
      if (!piece) continue;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (canPlace(piece, r, c)) return true;
        }
      }
    }
    return false;
  }

  function checkGameOver() {
    if (pieces.every(p => p === null)) {
      spawnPieces();
    }
    if (!canPlaceAny()) {
      state = STATE.GAME_OVER;
      shakeTimer = 15;
    }
  }

  // ========== DRAWING ==========
  function hexToRgba(hex, a) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r},${g},${b},${a})`;
  }

  function drawGrid() {
    const cell = getCellSize();
    const origin = getGridOrigin();
    const gw = cell * COLS;
    const gh = cell * ROWS;

    // Grid background
    ctx.fillStyle = 'rgba(255,255,255,0.02)';
    ctx.beginPath();
    ctx.roundRect(origin.x - 4, origin.y - 4, gw + 8, gh + 8, 8);
    ctx.fill();

    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    for (let r = 0; r <= ROWS; r++) {
      ctx.beginPath();
      ctx.moveTo(origin.x, origin.y + r * cell);
      ctx.lineTo(origin.x + gw, origin.y + r * cell);
      ctx.stroke();
    }
    for (let c = 0; c <= COLS; c++) {
      ctx.beginPath();
      ctx.moveTo(origin.x + c * cell, origin.y);
      ctx.lineTo(origin.x + c * cell, origin.y + gh);
      ctx.stroke();
    }

    // Filled cells
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (grid[r][c] !== 0) {
          drawBlock(origin.x + c * cell, origin.y + r * cell, cell, grid[r][c], 1);
        }
      }
    }
  }

  function drawBlock(x, y, size, color, alpha) {
    const pad = 2;
    ctx.fillStyle = hexToRgba(color, alpha * 0.85);
    ctx.shadowColor = color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.roundRect(x + pad, y + pad, size - pad * 2, size - pad * 2, 4);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Inner highlight
    ctx.fillStyle = hexToRgba(color, alpha * 0.25);
    ctx.beginPath();
    ctx.roundRect(x + pad + 3, y + pad + 3, size - pad * 2 - 6, (size - pad * 2) * 0.35, 3);
    ctx.fill();
  }

  function drawPieces() {
    const cell = getCellSize();
    const pieceCell = cell * 0.6;
    const areaY = getPieceAreaY();
    const areaH = H() - areaY - 10;

    // Piece area background
    ctx.fillStyle = 'rgba(255,255,255,0.02)';
    ctx.beginPath();
    ctx.roundRect(W() * 0.05, areaY - 5, W() * 0.9, areaH, 12);
    ctx.fill();

    const slots = 3;
    const slotW = W() * 0.9 / slots;

    for (let i = 0; i < pieces.length; i++) {
      const piece = pieces[i];
      if (!piece) continue;
      if (dragging && dragging.pieceIndex === i) continue;

      // Calculate piece bounds
      let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;
      for (const [r, c] of piece.cells) {
        minR = Math.min(minR, r); maxR = Math.max(maxR, r);
        minC = Math.min(minC, c); maxC = Math.max(maxC, c);
      }
      const pw = (maxC - minC + 1) * pieceCell;
      const ph = (maxR - minR + 1) * pieceCell;

      const cx = W() * 0.05 + slotW * i + slotW / 2;
      const cy = areaY + areaH / 2;
      const ox = cx - pw / 2;
      const oy = cy - ph / 2;

      for (const [r, c] of piece.cells) {
        drawBlock(ox + (c - minC) * pieceCell, oy + (r - minR) * pieceCell, pieceCell, piece.color, 0.8);
      }
    }
  }

  function getDragGridPos() {
    // Returns the grid row/col where the piece's top-left cell would be placed
    const cell = getCellSize();
    const origin = getGridOrigin();
    // Top-left of dragged piece in screen coords
    const pieceX = dragging.x - dragging.offsetX;
    const pieceY = dragging.y - dragging.offsetY - cell * 1.5; // lift above finger
    const gridCol = Math.round((pieceX - origin.x) / cell);
    const gridRow = Math.round((pieceY - origin.y) / cell);
    return { gridRow, gridCol };
  }

  function drawDragging() {
    if (!dragging) return;
    const piece = pieces[dragging.pieceIndex];
    if (!piece) return;

    const cell = getCellSize();
    const origin = getGridOrigin();
    const { gridRow, gridCol } = getDragGridPos();
    const valid = canPlace(piece, gridRow, gridCol);

    // Draw ghost on grid
    for (const [r, c] of piece.cells) {
      const gr = gridRow + r;
      const gc = gridCol + c;
      if (gr >= 0 && gr < ROWS && gc >= 0 && gc < COLS) {
        const gx = origin.x + gc * cell;
        const gy = origin.y + gr * cell;
        ctx.fillStyle = hexToRgba(piece.color, valid ? 0.35 : 0.15);
        ctx.beginPath();
        ctx.roundRect(gx + 2, gy + 2, cell - 4, cell - 4, 4);
        ctx.fill();
      }
    }

    // Draw piece at cursor (lifted above finger/cursor)
    const pieceX = dragging.x - dragging.offsetX;
    const pieceY = dragging.y - dragging.offsetY - cell * 1.5;
    for (const [r, c] of piece.cells) {
      drawBlock(pieceX + c * cell, pieceY + r * cell, cell, piece.color, valid ? 1 : 0.5);
    }
  }

  function drawClearAnimations() {
    const cell = getCellSize();
    const origin = getGridOrigin();

    for (const anim of clearAnimations) {
      const alpha = anim.timer / 20;
      const scale = 1 + (1 - alpha) * 0.3;
      for (const { r, c, color } of anim.cells) {
        const cx = origin.x + c * cell + cell / 2;
        const cy = origin.y + r * cell + cell / 2;
        ctx.save();
        ctx.translate(cx, cy);
        ctx.scale(scale, scale);
        ctx.fillStyle = hexToRgba(color, alpha * 0.8);
        ctx.shadowColor = color;
        ctx.shadowBlur = 15 * alpha;
        ctx.beginPath();
        ctx.roundRect(-cell / 2 + 2, -cell / 2 + 2, cell - 4, cell - 4, 4);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.restore();
      }
    }
  }

  function drawUI() {
    ctx.textAlign = 'center';

    // Score (top center)
    const origin = getGridOrigin();
    const cell = getCellSize();
    const gw = cell * COLS;

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 24px "Segoe UI", sans-serif';
    ctx.shadowColor = NEON_BLUE;
    ctx.shadowBlur = 10;
    // Position score above grid, right side
    ctx.textAlign = 'right';
    ctx.fillText(score.toString(), origin.x + gw, origin.y - 10);
    ctx.shadowBlur = 0;

    // High score label
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '11px "Segoe UI", sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('BÄSTA: ' + highScore, origin.x, origin.y - 12);

    // Score popups
    ctx.textAlign = 'center';
    for (const pop of scorePopups) {
      const alpha = Math.min(1, pop.timer / 30);
      const yOff = (60 - pop.timer) * 0.8;
      ctx.fillStyle = hexToRgba(pop.color, alpha);
      ctx.shadowColor = pop.color;
      ctx.shadowBlur = 10;
      ctx.font = 'bold 22px "Segoe UI", sans-serif';
      ctx.fillText(pop.text, pop.x, pop.y - yOff);
      ctx.shadowBlur = 0;
    }
  }

  function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W(), H());

    ctx.textAlign = 'center';
    ctx.shadowColor = NEON_PINK;
    ctx.shadowBlur = 20;
    ctx.fillStyle = NEON_PINK;
    ctx.font = 'bold 40px "Segoe UI", sans-serif';
    ctx.fillText('GAME OVER', W() / 2, H() / 2 - 40);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 24px "Segoe UI", sans-serif';
    ctx.fillText('Poäng: ' + score, W() / 2, H() / 2 + 10);

    if (score >= highScore && score > 0) {
      ctx.fillStyle = hexToRgba(NEON_GREEN, 0.7 + 0.3 * Math.sin(Date.now() * 0.005));
      ctx.font = 'bold 18px "Segoe UI", sans-serif';
      ctx.fillText('NYTT REKORD!', W() / 2, H() / 2 + 40);
    }

    const p = 0.5 + 0.5 * Math.sin(Date.now() * 0.004);
    ctx.fillStyle = hexToRgba('#ffffff', p);
    ctx.font = '15px "Segoe UI", sans-serif';
    ctx.fillText('Tryck för att spela igen', W() / 2, H() / 2 + 80);
  }

  // ========== INPUT ==========
  let pointerDown = false;

  function getPointerPos(e) {
    const t = e.touches ? e.touches[0] || e.changedTouches[0] : e;
    return { x: t.clientX, y: t.clientY };
  }

  // Get the top-left origin of a piece in the piece tray
  function getPieceOrigin(i) {
    const cell = getCellSize();
    const pieceCell = cell * 0.6;
    const areaY = getPieceAreaY();
    const areaH = H() - areaY - 10;
    const slotW = W() * 0.9 / 3;
    const piece = pieces[i];
    if (!piece) return null;

    let minR = Infinity, maxR = -Infinity, minC = Infinity, maxC = -Infinity;
    for (const [r, c] of piece.cells) {
      minR = Math.min(minR, r); maxR = Math.max(maxR, r);
      minC = Math.min(minC, c); maxC = Math.max(maxC, c);
    }
    const pw = (maxC - minC + 1) * pieceCell;
    const ph = (maxR - minR + 1) * pieceCell;
    const cx = W() * 0.05 + slotW * i + slotW / 2;
    const cy = areaY + areaH / 2;
    return { ox: cx - pw / 2, oy: cy - ph / 2, minR, minC, pw, ph };
  }

  function findPieceAt(x, y) {
    const cell = getCellSize();
    const pieceCell = cell * 0.6;

    for (let i = 0; i < pieces.length; i++) {
      if (!pieces[i]) continue;
      const info = getPieceOrigin(i);
      if (!info) continue;

      if (x >= info.ox - 15 && x <= info.ox + info.pw + 15 && y >= info.oy - 15 && y <= info.oy + info.ph + 15) {
        // Offset = distance from click to the piece's top-left corner (in grid-cell coords)
        // Scale from pieceCell to full cell size
        const scale = cell / pieceCell;
        const offsetX = (x - info.ox) * scale;
        const offsetY = (y - info.oy) * scale;
        return { pieceIndex: i, offsetX, offsetY, minR: info.minR, minC: info.minC };
      }
    }
    return null;
  }

  function onPointerDown(e) {
    e.preventDefault();
    const pos = getPointerPos(e);

    if (state === STATE.GAME_OVER) {
      init();
      return;
    }

    const found = findPieceAt(pos.x, pos.y);
    if (found) {
      dragging = { ...found, x: pos.x, y: pos.y };
      pointerDown = true;
    }
  }

  function onPointerMove(e) {
    e.preventDefault();
    if (!dragging) return;
    const pos = getPointerPos(e);
    dragging.x = pos.x;
    dragging.y = pos.y;
  }

  function onPointerUp(e) {
    e.preventDefault();
    if (!dragging) return;
    const pos = getPointerPos(e);
    dragging.x = pos.x;
    dragging.y = pos.y;

    const piece = pieces[dragging.pieceIndex];
    if (piece) {
      const { gridRow, gridCol } = getDragGridPos();

      if (canPlace(piece, gridRow, gridCol)) {
        placePiece(piece, gridRow, gridCol);
        pieces[dragging.pieceIndex] = null;

        // Clear lines (can chain)
        let totalCleared = 0;
        let cleared;
        do {
          cleared = checkAndClearLines();
          totalCleared += cleared;
        } while (cleared > 0);

        // If all 3 pieces used, spawn new ones
        if (pieces.every(p => p === null)) {
          spawnPieces();
        }

        checkGameOver();
      }
    }

    dragging = null;
    pointerDown = false;
  }

  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('mousemove', onPointerMove);
  canvas.addEventListener('mouseup', onPointerUp);
  canvas.addEventListener('touchstart', onPointerDown, { passive: false });
  canvas.addEventListener('touchmove', onPointerMove, { passive: false });
  canvas.addEventListener('touchend', onPointerUp, { passive: false });

  // ========== UPDATE ==========
  function update() {
    // Animate clear effects
    for (const anim of clearAnimations) anim.timer--;
    clearAnimations = clearAnimations.filter(a => a.timer > 0);

    // Animate score popups
    for (const pop of scorePopups) pop.timer--;
    scorePopups = scorePopups.filter(p => p.timer > 0);

    if (shakeTimer > 0) shakeTimer--;
  }

  // ========== GAME LOOP ==========
  function gameLoop() {
    update();

    ctx.clearRect(0, 0, W(), H());

    ctx.save();
    if (shakeTimer > 0) {
      ctx.translate((Math.random() - 0.5) * shakeTimer * 1.5, (Math.random() - 0.5) * shakeTimer * 1.5);
    }

    drawGrid();
    drawClearAnimations();
    drawPieces();
    drawDragging();
    drawUI();

    if (state === STATE.GAME_OVER) {
      drawGameOver();
    }

    ctx.restore();
    requestAnimationFrame(gameLoop);
  }

  // ========== START ==========
  init();
  gameLoop();
})();
</script>
</body>
</html>
