<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a1a"/>
      <stop offset="50%" style="stop-color:#0f1f0f"/>
      <stop offset="100%" style="stop-color:#1a1510"/>
    </linearGradient>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1a"/>
      <stop offset="100%" style="stop-color:#1a2a1a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Sky -->
  <rect fill="url(#sky)" width="400" height="160"/>
  <!-- Forest ground -->
  <rect fill="url(#bg)" y="160" width="400" height="140"/>
  <!-- Moon -->
  <circle cx="320" cy="50" r="18" fill="#e8dcc8" opacity="0.8" filter="url(#glow)"/>
  <circle cx="326" cy="46" r="16" fill="#0a0f1a"/>
  <!-- Stars -->
  <circle cx="50" cy="30" r="1.2" fill="#fff" opacity="0.6"/>
  <circle cx="120" cy="18" r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="200" cy="40" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="260" cy="25" r="1.5" fill="#fff" opacity="0.3"/>
  <circle cx="80" cy="65" r="0.8" fill="#fff" opacity="0.4"/>
  <circle cx="170" cy="15" r="1" fill="#fff" opacity="0.5"/>
  <!-- Trees (dark forest silhouettes) -->
  <polygon points="30,160 45,70 60,160" fill="#0a150a" opacity="0.9"/>
  <polygon points="55,160 75,55 95,160" fill="#0f1a0f" opacity="0.85"/>
  <polygon points="90,160 108,80 126,160" fill="#0a150a" opacity="0.9"/>
  <polygon points="280,160 298,65 316,160" fill="#0f1a0f" opacity="0.85"/>
  <polygon points="310,160 330,50 350,160" fill="#0a150a" opacity="0.9"/>
  <polygon points="345,160 365,75 385,160" fill="#0f1a0f" opacity="0.8"/>
  <!-- Path/trail -->
  <path d="M 160 300 Q 180 240 200 200 Q 220 170 200 160" stroke="#3a3020" stroke-width="20" fill="none" opacity="0.4"/>
  <path d="M 160 300 Q 180 240 200 200 Q 220 170 200 160" stroke="#4a4030" stroke-width="2" fill="none" opacity="0.3" stroke-dasharray="4,6"/>
  <!-- Three figures (silhouettes) -->
  <!-- Maja -->
  <circle cx="175" cy="175" r="5" fill="#1a1510"/>
  <rect x="172" y="180" width="6" height="14" rx="2" fill="#1a1510"/>
  <!-- Ben -->
  <circle cx="195" cy="177" r="4.5" fill="#1a1510"/>
  <rect x="192" y="182" width="6" height="12" rx="2" fill="#1a1510"/>
  <!-- Hilde -->
  <circle cx="213" cy="176" r="5" fill="#1a1510"/>
  <rect x="210" y="181" width="6" height="13" rx="2" fill="#1a1510"/>
  <!-- Warm light from a lantern -->
  <circle cx="195" cy="188" r="25" fill="#b48c50" opacity="0.08"/>
  <circle cx="195" cy="188" r="12" fill="#b48c50" opacity="0.12"/>
  <circle cx="195" cy="188" r="3" fill="#d4a55a" opacity="0.4" filter="url(#glow)"/>
  <!-- Black rose -->
  <circle cx="45" cy="250" r="8" fill="#2a0a0a" opacity="0.8"/>
  <circle cx="45" cy="250" r="5" fill="#1a0505" opacity="0.9"/>
  <path d="M 45 258 L 45 285" stroke="#2a3a1a" stroke-width="2"/>
  <ellipse cx="50" cy="272" rx="5" ry="2" fill="#2a3a1a" opacity="0.6" transform="rotate(-30 50 272)"/>
  <!-- Border line (Sweden-Norway) -->
  <line x1="0" y1="160" x2="400" y2="160" stroke="#b48c50" stroke-width="0.5" opacity="0.3" stroke-dasharray="8,4"/>
  <!-- Title -->
  <text x="200" y="270" text-anchor="middle" font-family="Georgia, serif" font-weight="bold" font-size="26" fill="#e8dcc8">Uppdraget</text>
  <text x="200" y="290" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#b48c50" font-style="italic">Svarta Rosorna</text>
</svg>
