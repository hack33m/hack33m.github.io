<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5c9"/>
      <stop offset="100%" style="stop-color:#1e3a5f"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5b342"/>
      <stop offset="50%" style="stop-color:#d4860a"/>
      <stop offset="100%" style="stop-color:#5c3317"/>
    </linearGradient>
    <linearGradient id="boost" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6a00"/>
      <stop offset="100%" style="stop-color:#d4860a"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bg)"/>
  <!-- Platforms (Corny bars) -->
  <rect x="50" y="230" width="90" height="22" rx="6" fill="url(#bar)"/>
  <rect x="180" y="180" width="90" height="22" rx="6" fill="url(#bar)"/>
  <rect x="280" y="130" width="90" height="22" rx="6" fill="url(#boost)" stroke="#ff6a00" stroke-width="1.5"/>
  <rect x="100" y="90" width="90" height="22" rx="6" fill="url(#bar)"/>
  <!-- Character -->
  <circle cx="220" cy="158" r="20" fill="#f5b342"/>
  <path d="M200,162 A20,20 0 0,0 240,162 Z" fill="#5c3317"/>
  <!-- Eyes -->
  <ellipse cx="212" cy="153" rx="4" ry="5" fill="white"/>
  <ellipse cx="228" cy="153" rx="4" ry="5" fill="white"/>
  <circle cx="213" cy="154" r="2.5" fill="#5c3317"/>
  <circle cx="229" cy="154" r="2.5" fill="#5c3317"/>
  <!-- Smile -->
  <path d="M215,161 Q220,167 225,161" fill="none" stroke="#5c3317" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Jump lines -->
  <line x1="210" y1="178" x2="205" y2="185" stroke="#f5b342" stroke-width="2" opacity="0.5"/>
  <line x1="220" y1="178" x2="220" y2="187" stroke="#f5b342" stroke-width="2" opacity="0.5"/>
  <line x1="230" y1="178" x2="235" y2="185" stroke="#f5b342" stroke-width="2" opacity="0.5"/>
  <!-- Title -->
  <text x="200" y="50" text-anchor="middle" font-family="Segoe UI, sans-serif" font-size="32" font-weight="bold" fill="white">CORNY JUMP</text>
</svg>
