<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop - Elias Spelportal</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="shop-page">
  <header class="header">
    <div class="header-inner">
      <a href="index.html" class="back-button">← Tillbaka</a>
      <div class="logo" id="logo">
        <span class="logo-icon">🛒</span>
        <span class="logo-text">Shop</span>
      </div>
      <div class="shop-coins-header">🪙 <span id="shop-coins">0</span></div>
      <div class="header-auth" id="header-auth"></div>
    </div>
  </header>

  <!-- Auth Modal -->
  <div class="modal-overlay" id="auth-modal">
    <div class="modal auth-modal">
      <div class="modal-header">
        <h2 id="auth-modal-title">Logga in</h2>
        <button class="modal-close" id="auth-close">&times;</button>
      </div>
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Logga in</button>
        <button class="auth-tab" data-tab="register">Skapa konto</button>
      </div>
      <form id="login-form" class="auth-form">
        <label class="modal-label" for="login-username">Användarnamn</label>
        <input type="text" id="login-username" class="modal-input" placeholder="Ditt användarnamn" required>
        <label class="modal-label" for="login-password">Lösenord</label>
        <input type="password" id="login-password" class="modal-input" placeholder="Ditt lösenord" required>
        <p class="auth-error" id="login-error"></p>
        <button type="submit" class="modal-submit">Logga in</button>
      </form>
      <form id="register-form" class="auth-form" style="display:none;">
        <label class="modal-label" for="reg-username">Välj användarnamn</label>
        <input type="text" id="reg-username" class="modal-input" placeholder="Minst 3 tecken" required minlength="3">
        <label class="modal-label" for="reg-password">Välj lösenord</label>
        <input type="password" id="reg-password" class="modal-input" placeholder="Minst 4 tecken" required minlength="4">
        <label class="modal-label" for="reg-password2">Upprepa lösenord</label>
        <input type="password" id="reg-password2" class="modal-input" placeholder="Samma lösenord igen" required>
        <label class="modal-label">Välj avatar</label>
        <div class="avatar-picker" id="reg-avatar-picker"></div>
        <p class="auth-error" id="register-error"></p>
        <button type="submit" class="modal-submit">Skapa konto</button>
      </form>
    </div>
  </div>

  <main class="main shop-main">
    <div class="shop-header-banner">
      <h1>🛒 Shoppa med dina coins</h1>
      <p>Tjäna coins genom att spela spel och köp coola saker!</p>
    </div>
    <div id="shop-grid"></div>
  </main>

  <footer class="footer">
    <p>Skapat av <strong>Elia</strong> &mdash; Elias Spelportal &copy; 2026</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/supabase-config.js"></script>
  <script>document.write('<script src="js/app.js?v='+Date.now()+'"><\/script>');</script>
</body>
</html>
